<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>TBS Hex Map — Pass & Play 1v1</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: #111a2e;
      --line: #1f2a44;
      --text: #e6ecff;
      --muted: #8b9bbf;
      --p1: #dc2626;
      --p2: #3b82f6;
      --brown-light: #c8a878;
      --brown-dark: #6b3e1f;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overscroll-behavior: none; touch-action: none; }
    #canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; background: var(--bg); }

    /* Top turn banner */
    #topBar {
      position: fixed;
      top: env(safe-area-inset-top, 8px);
      left: env(safe-area-inset-left, 8px);
      right: env(safe-area-inset-right, 8px);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: none;
      padding: 4px;
    }
    .pill { pointer-events: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 999px; padding: 6px 10px; font-size: 12px; color: var(--text); }
    .pill.muted { color: var(--muted); }
    button.pill { cursor: pointer; user-select: none; }
    button.pill:active { transform: scale(0.97); }
    button.pill.primary { background: var(--p1); border-color: transparent; color: white; font-weight: 600; }
    button.pill.p2 { background: var(--p2); }
    #seedInput { background: var(--bg); color: var(--text); border: 1px solid var(--line); border-radius: 999px; padding: 4px 8px; width: 80px; font-size: 12px; }
    #turnPill { font-weight: 600; }
    #turnPill.p1 { color: var(--p1); }
    #turnPill.p2 { color: var(--p2); }

    /* Bottom hover label + legend */
    #bottomBar {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 8px) + 4px);
      left: env(safe-area-inset-left, 8px);
      right: env(safe-area-inset-right, 8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: none;
    }
    #hoverPill { background: var(--panel); border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px; font-size: 11px; color: var(--muted); pointer-events: auto; }
    #endTurnBtn {
      pointer-events: auto;
      background: var(--p1);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      letter-spacing: 0.5px;
    }
    #endTurnBtn.p2 { background: var(--p2); }
    #endTurnBtn:active { transform: scale(0.97); }

    /* Action picker (village or unit) */
    #actionPicker {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(env(safe-area-inset-bottom, 8px) + 56px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      min-width: 240px;
      max-width: 340px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      z-index: 10;
      display: none;
    }
    .ap-title { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
    .ap-sub { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
    .ap-buttons { display: flex; gap: 8px; margin-bottom: 8px; }
    .ap-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: var(--bg); color: var(--text); border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; font-size: 12px; cursor: pointer; }
    .ap-btn:hover:not(:disabled) { background: #1a2542; }
    .ap-btn:active:not(:disabled) { transform: scale(0.97); }
    .ap-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .ap-icon { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #0006; }
    .ap-cost { font-size: 10px; color: var(--muted); }
    .ap-close { width: 100%; background: transparent; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; padding: 5px 10px; font-size: 11px; cursor: pointer; }
    .ap-close:hover { color: var(--text); }

    /* Pass-the-device screen */
    #passOverlay {
      position: fixed;
      inset: 0;
      background: rgba(11, 18, 32, 0.97);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 50;
      padding: 24px;
      text-align: center;
    }
    #passOverlay h1 { font-size: 28px; margin: 0 0 8px; }
    #passOverlay p { color: var(--muted); margin: 0 0 24px; }
    #passOverlay button { background: var(--p1); color: white; border: none; border-radius: 12px; padding: 14px 28px; font-size: 16px; font-weight: 600; cursor: pointer; }
    #passOverlay button.p2 { background: var(--p2); }

    /* Win screen */
    #winOverlay {
      position: fixed;
      inset: 0;
      background: rgba(11, 18, 32, 0.97);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 60;
      padding: 24px;
      text-align: center;
    }
    #winOverlay h1 { font-size: 36px; margin: 0 0 12px; }
    #winOverlay p { color: var(--muted); margin: 0 0 24px; }
    #winOverlay button { background: var(--panel); color: white; border: 1px solid var(--line); border-radius: 12px; padding: 12px 24px; font-size: 14px; cursor: pointer; }

    /* Combat log toast */
    #combatToast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 5;
      max-width: 90%;
    }
    #combatToast.show { opacity: 1; }

    @media (max-width: 480px) {
      .pill { font-size: 11px; padding: 5px 8px; }
      #seedInput { width: 60px; }
      #passOverlay h1 { font-size: 22px; }
      #winOverlay h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="topBar">
    <div class="pill" id="turnPill">P1 · 5★ · Turn 1</div>
    <label class="pill"><span class="muted">seed</span>&nbsp;<input id="seedInput" type="text" inputmode="numeric" pattern="[0-9]*" /></label>
    <button class="pill" id="newGameBtn">New</button>
  </div>

  <div id="bottomBar">
    <span id="hoverPill">tap a hex</span>
    <button id="endTurnBtn">End Turn</button>
  </div>

  <div id="actionPicker">
    <div class="ap-title" id="apTitle">My Village</div>
    <div class="ap-sub" id="apSub">Empty — train a unit</div>
    <div class="ap-buttons">
      <button class="ap-btn" id="makeWarriorBtn">
        <div class="ap-icon" style="background:#3b82f6"></div>
        <span>Warrior</span>
        <span class="ap-cost">2★</span>
      </button>
      <button class="ap-btn" id="makeRiderBtn">
        <div class="ap-icon" style="background:#78350f"></div>
        <span>Rider</span>
        <span class="ap-cost">3★</span>
      </button>
    </div>
    <button class="ap-close" id="apCloseBtn">Close</button>
  </div>

  <div id="passOverlay">
    <h1 id="passTitle">Pass to Player 2</h1>
    <p>Hand the device over. Tap the button below when ready.</p>
    <button id="passBtn">I'm Player 2 — start turn</button>
  </div>

  <div id="winOverlay">
    <h1 id="winTitle">Player 1 wins!</h1>
    <p id="winSub">Captured the opposing village.</p>
    <button id="winRestartBtn">Play again</button>
  </div>

  <div id="combatToast"></div>

<script>
'use strict';

// ============================================================
// PASS & PLAY 1v1 — turn-based hex combat
// ------------------------------------------------------------
// Two human players take turns on the same device.
// Per spec at /specs/pass-n-play-1v1.md, rules per doc 10 GDD.
// Pure-logic functions sit at the top; render + input below.
// ============================================================

// ---- Seeded RNG (mulberry32) ----
function mulberry32(seed) {
  let s = seed >>> 0;
  return function () {
    s |= 0; s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ---- Board params ----
const BOARD_RADIUS = 6;
const HEX_SIZE = 36;
const ISO_Y_SCALE = 0.68;
const TILE_DEPTH = 14;
const WATER_SINK = 7;
const VILLAGE_TARGET = 8;
const VILLAGE_MIN_DIST = 3;
const STARTING_STARS = 5;
const STARS_PER_VILLAGE = 2;

const TILE = {
  WATER:    { id: 'water',    top: '#2563eb', side: '#1e3a8a', label: 'water',    passable: false, defenseBonus: 1.0 },
  PLAINS:   { id: 'plains',   top: '#86efac', side: '#4d7c4f', label: 'plains',   passable: true,  defenseBonus: 1.0 },
  TREES:    { id: 'trees',    top: '#15803d', side: '#14532d', label: 'trees',    passable: true,  defenseBonus: 1.5 },
  MOUNTAIN: { id: 'mountain', top: '#a8a29e', side: '#57534e', label: 'mountain', passable: true,  defenseBonus: 1.5 },
};

const UNIT_STATS = {
  warrior: { hp: 10, atk: 2, def: 2, move: 1, range: 1, cost: 2, dash: false, label: 'Warrior' },
  rider:   { hp: 10, atk: 2, def: 1, move: 2, range: 1, cost: 3, dash: true,  label: 'Rider'   },
};

const PLAYER_COLORS = {
  0: { body: '#dc2626', dark: '#991b1b', label: 'Player 1', short: 'P1' }, // RED
  1: { body: '#3b82f6', dark: '#1d4ed8', label: 'Player 2', short: 'P2' }, // BLUE
};

// ---- Hex math ----
const SQRT3 = Math.sqrt(3);
const HEX_NEIGHBOR_OFFSETS = [
  { q:  1, r:  0 }, { q:  1, r: -1 }, { q:  0, r: -1 },
  { q: -1, r:  0 }, { q: -1, r:  1 }, { q:  0, r:  1 },
];

function neighborsOf(q, r) { return HEX_NEIGHBOR_OFFSETS.map(n => ({ q: q + n.q, r: r + n.r })); }
function hexDistance(q1, r1, q2, r2) {
  const s1 = -q1 - r1, s2 = -q2 - r2;
  return Math.max(Math.abs(q1 - q2), Math.abs(r1 - r2), Math.abs(s1 - s2));
}
function axialToWorld(q, r) {
  return { x: HEX_SIZE * 1.5 * q, y: HEX_SIZE * SQRT3 * (r + q / 2) };
}
const HEX_CORNER_OFFSETS = (() => {
  const offsets = [];
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 180) * (60 * i);
    offsets.push({ x: HEX_SIZE * Math.cos(a), y: HEX_SIZE * Math.sin(a) });
  }
  return offsets;
})();

// ============================================================
// PURE LOGIC — combat, movement, reachability
// ============================================================

// GDD combat formula (verbatim).
function resolveCombat(attacker, defender, defenseBonus) {
  const aMax = UNIT_STATS[attacker.type].hp;
  const dMax = UNIT_STATS[defender.type].hp;
  const attackForce = UNIT_STATS[attacker.type].atk * (attacker.hp / aMax);
  const defenseForce = UNIT_STATS[defender.type].def * (defender.hp / dMax) * defenseBonus;
  const totalDamage = attackForce + defenseForce;
  if (totalDamage === 0) return { attackerDamage: 0, defenderDamage: 0 };
  const defenderDamage = Math.round((attackForce  / totalDamage) * UNIT_STATS[attacker.type].atk * 4.5);
  const attackerDamage = Math.round((defenseForce / totalDamage) * UNIT_STATS[defender.type].def * 4.5);
  return { attackerDamage, defenderDamage };
}

// BFS over passable tiles for "reachable" within move points.
// Cannot pass through tiles occupied by any unit (own or enemy).
// Cannot end on a tile occupied by any unit.
function reachableTiles(state, unit) {
  const startKey = `${unit.q},${unit.r}`;
  const visited = new Map(); // key → cost
  visited.set(startKey, 0);
  const queue = [{ q: unit.q, r: unit.r, cost: 0 }];
  const move = UNIT_STATS[unit.type].move;
  while (queue.length) {
    const { q, r, cost } = queue.shift();
    if (cost >= move) continue;
    for (const { q: nq, r: nr } of neighborsOf(q, r)) {
      const k = `${nq},${nr}`;
      if (visited.has(k)) continue;
      const tile = state.tileAt(nq, nr);
      if (!tile) continue;
      if (!tile.type.passable) continue;
      // Can't step onto any unit
      if (state.unitAt(nq, nr)) continue;
      visited.set(k, cost + 1);
      queue.push({ q: nq, r: nr, cost: cost + 1 });
    }
  }
  visited.delete(startKey);
  const out = [];
  for (const k of visited.keys()) {
    const [q, r] = k.split(',').map(Number);
    out.push({ q, r });
  }
  return out;
}

// Tiles within attack range containing an enemy unit.
// Enemy units out of vision are not attackable (you can't see them).
function attackableTiles(state, unit) {
  const visible = visibilityForPlayer(state, unit.player);
  const out = [];
  const range = UNIT_STATS[unit.type].range;
  for (const u of state.units) {
    if (u.player === unit.player) continue;
    if (!isVisible(visible, u.q, u.r)) continue;
    const d = hexDistance(unit.q, unit.r, u.q, u.r);
    if (d <= range && d > 0) out.push({ q: u.q, r: u.r });
  }
  return out;
}

function tileDefenseBonus(tile) {
  if (tile.hasVillage) return 1.5;
  return tile.type.defenseBonus;
}

// SC2-style fog of war (per doc 10 §2.1.1):
//   Terrain & village positions = always public.
//   Enemy units = visible only when within vision radius of an own unit or
//                 own village. Vision radius = 1 hex (own tile + neighbors).
//                 Mountains grant radius 2 — but units don't sit on mountains
//                 in this prototype, so radius 1 across the board.
//   "Last seen" memory of enemy units is deferred to v0.2.
function visibilityForPlayer(state, playerId) {
  const visible = new Set();
  const add = (q, r) => visible.add(`${q},${r}`);
  // Own villages — capital gets radius 2, all others radius 1.
  for (const t of state.map.tiles) {
    if (t.hasVillage && t.ownerPlayer === playerId) {
      const r = t.isCapital ? 2 : 1;
      for (const tt of state.map.tiles) {
        if (hexDistance(t.q, t.r, tt.q, tt.r) <= r) add(tt.q, tt.r);
      }
    }
  }
  // Own units — radius 1, or 2 if standing on a mountain (per GDD §2.6).
  for (const u of state.units) {
    if (u.player === playerId) {
      const r = state.tileAt(u.q, u.r).type === TILE.MOUNTAIN ? 2 : 1;
      for (const t of state.map.tiles) {
        if (hexDistance(u.q, u.r, t.q, t.r) <= r) add(t.q, t.r);
      }
    }
  }
  return visible;
}

function isVisible(visibleSet, q, r) {
  return visibleSet.has(`${q},${r}`);
}

// ============================================================
// MAP GENERATION
// ============================================================

function hexAxialsForRadius(radius) {
  const tiles = [];
  for (let q = -radius; q <= radius; q++) {
    for (let r = -radius; r <= radius; r++) {
      const s = -q - r;
      if (Math.max(Math.abs(q), Math.abs(r), Math.abs(s)) <= radius) tiles.push({ q, r });
    }
  }
  return tiles;
}

function generateMap(seed, radius) {
  const rng = mulberry32(seed);
  const cells = hexAxialsForRadius(radius);

  function pickAxialPoints(n) {
    const pts = [];
    for (let i = 0; i < n; i++) pts.push({ q: (rng() * 2 - 1) * radius, r: (rng() * 2 - 1) * radius });
    return pts;
  }

  const waterCenters = pickAxialPoints(3);
  const treeCenters  = pickAxialPoints(5);
  const mountainCenters = pickAxialPoints(3);

  function minAxialDistance(q, r, points) {
    let best = Infinity;
    for (const p of points) {
      const d = Math.max(Math.abs(q - p.q), Math.abs(r - p.r), Math.abs((q + r) - (p.q + p.r)));
      if (d < best) best = d;
    }
    return best;
  }

  const tiles = cells.map(({ q, r }) => {
    const waterScore = minAxialDistance(q, r, waterCenters) + 0.5 * rng();
    const treeScore  = minAxialDistance(q, r, treeCenters)  + 0.6 * rng();
    const mountScore = minAxialDistance(q, r, mountainCenters) + 0.4 * rng();
    let type = TILE.PLAINS;
    if (waterScore < 1.6) type = TILE.WATER;
    else if (mountScore < 1.5) type = TILE.MOUNTAIN;
    else if (treeScore < 1.8) type = TILE.TREES;
    const s = -q - r;
    const ringDist = radius - Math.max(Math.abs(q), Math.abs(r), Math.abs(s));
    if (ringDist === 0 && rng() < 0.55) type = TILE.WATER;
    else if (ringDist === 1 && rng() < 0.22) type = TILE.WATER;
    return { q, r, type, hasVillage: false, ownerPlayer: null, isCapital: false };
  });

  // Villages on plains
  const candidates = tiles.filter(t => t.type === TILE.PLAINS).slice();
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  const villages = [];
  for (const c of candidates) {
    if (villages.length >= VILLAGE_TARGET) break;
    const ok = villages.every(v => hexDistance(v.q, v.r, c.q, c.r) >= VILLAGE_MIN_DIST);
    if (ok) { villages.push(c); c.hasVillage = true; }
  }

  // Pick the two most-distant villages as P1 and P2 capitals.
  // Capital constraint: at least 2 tiles in from the board edge so neither
  // player spawns on the border. If no candidate qualifies (very small map
  // or pathological gen), fall back to the unfiltered village list.
  const capitalPool = villages.filter(v => {
    const s = -v.q - v.r;
    return Math.max(Math.abs(v.q), Math.abs(v.r), Math.abs(s)) <= radius - 2;
  });
  const pool = capitalPool.length >= 2 ? capitalPool : villages;
  let p1V = null, p2V = null, best = -1;
  for (let i = 0; i < pool.length; i++) {
    for (let j = i + 1; j < pool.length; j++) {
      const d = hexDistance(pool[i].q, pool[i].r, pool[j].q, pool[j].r);
      if (d > best) { best = d; p1V = pool[i]; p2V = pool[j]; }
    }
  }
  if (p1V) { p1V.ownerPlayer = 0; p1V.isCapital = true; }
  if (p2V) { p2V.ownerPlayer = 1; p2V.isCapital = true; }

  return { radius, tiles, seed };
}

// ============================================================
// GAME STATE
// ============================================================

function newGame(seed) {
  const map = generateMap(seed, BOARD_RADIUS);
  const state = {
    map,
    units: [],
    players: [
      { id: 0, stars: STARTING_STARS },
      { id: 1, stars: STARTING_STARS },
    ],
    currentPlayer: 0,
    turn: 1,
    phase: 'play', // 'play' | 'pass' | 'won'
    winner: null,
    selected: null, // { kind: 'unit'|'village', q, r }
    tileAt(q, r) { return this.map.tiles.find(t => t.q === q && t.r === r); },
    unitAt(q, r) { return this.units.find(u => u.q === q && u.r === r); },
    villageAt(q, r) { const t = this.tileAt(q, r); return t && t.hasVillage ? t : null; },
    ownedVillages(playerId) { return this.map.tiles.filter(t => t.hasVillage && t.ownerPlayer === playerId); },
  };
  return state;
}

function trainUnit(state, village, type) {
  const stats = UNIT_STATS[type];
  const player = state.players[state.currentPlayer];
  if (village.ownerPlayer !== state.currentPlayer) return false;
  if (state.unitAt(village.q, village.r)) return false;
  if (player.stars < stats.cost) return false;
  player.stars -= stats.cost;
  state.units.push({
    id: Math.random().toString(36).slice(2, 9),
    q: village.q,
    r: village.r,
    type,
    player: state.currentPlayer,
    hp: stats.hp,
    canMove: false,
    canAttack: false, // summoning sickness — no actions on creation turn
    hasMovedThisTurn: false,
  });
  return true;
}

function moveUnit(state, unit, toQ, toR) {
  if (unit.player !== state.currentPlayer) return false;
  if (!unit.canMove) return false;
  const tile = state.tileAt(toQ, toR);
  if (!tile || !tile.type.passable) return false;
  if (state.unitAt(toQ, toR)) return false;
  const dist = hexDistance(unit.q, unit.r, toQ, toR);
  if (dist > UNIT_STATS[unit.type].move) return false;
  // Verify the dest is in BFS-reachable set
  const reach = reachableTiles(state, unit);
  if (!reach.some(t => t.q === toQ && t.r === toR)) return false;
  unit.q = toQ;
  unit.r = toR;
  unit.canMove = false;
  unit.hasMovedThisTurn = true;
  // Warriors: moving consumes the action (no attack this turn).
  // Riders: Dash — can still attack after moving.
  if (!UNIT_STATS[unit.type].dash) unit.canAttack = false;
  return true;
}

function attackUnit(state, attacker, defender) {
  if (attacker.player !== state.currentPlayer) return null;
  if (!attacker.canAttack) return null;
  const dist = hexDistance(attacker.q, attacker.r, defender.q, defender.r);
  if (dist > UNIT_STATS[attacker.type].range) return null;
  const defTile = state.tileAt(defender.q, defender.r);
  const bonus = tileDefenseBonus(defTile);
  const { attackerDamage, defenderDamage } = resolveCombat(attacker, defender, bonus);
  defender.hp -= defenderDamage;
  if (defender.hp > 0) attacker.hp -= attackerDamage; // retaliation only if defender survives
  attacker.canAttack = false;
  attacker.canMove = false;
  const events = [{
    attackerType: attacker.type,
    defenderType: defender.type,
    defenderDamage,
    attackerDamage: defender.hp > 0 ? attackerDamage : 0,
    defenderKilled: defender.hp <= 0,
    attackerKilled: defender.hp > 0 && attacker.hp <= 0,
  }];
  state.units = state.units.filter(u => u.hp > 0);
  return events;
}

function startTurn(state) {
  // Star income
  const owned = state.ownedVillages(state.currentPlayer).length;
  state.players[state.currentPlayer].stars += STARS_PER_VILLAGE * owned;
  // Wake up all of this player's units (units trained THIS turn get summoning sickness off next turn)
  for (const u of state.units) {
    if (u.player === state.currentPlayer) {
      u.canMove = true;
      u.canAttack = true;
      u.hasMovedThisTurn = false;
    }
  }
}

function endTurn(state) {
  // Capture: if a unit is standing on an opposing village, capture it.
  for (const u of state.units) {
    const v = state.villageAt(u.q, u.r);
    if (v && v.ownerPlayer !== null && v.ownerPlayer !== u.player) {
      v.ownerPlayer = u.player;
    } else if (v && v.ownerPlayer === null) {
      v.ownerPlayer = u.player;
    }
  }
  // Check win: own at least one village and opponent owns none.
  for (let p = 0; p < 2; p++) {
    const opp = 1 - p;
    const oppOwns = state.map.tiles.some(t => t.hasVillage && t.ownerPlayer === opp);
    const oppUnits = state.units.some(u => u.player === opp);
    if (!oppOwns && !oppUnits) {
      state.phase = 'won';
      state.winner = p;
      return;
    }
  }
  // Advance
  state.currentPlayer = 1 - state.currentPlayer;
  if (state.currentPlayer === 0) state.turn += 1;
  state.phase = 'pass';
  state.selected = null;
}

// ============================================================
// CAMERA
// ============================================================
const camera = {
  x: 0, y: 0, zoom: 1,
  reset() { this.zoom = 1; this.recenter(); },
  recenter() { this.x = canvas.width / dpr / 2; this.y = canvas.height / dpr / 2; }
};

function worldToScreen(wx, wy) {
  return { x: camera.x + wx * camera.zoom, y: camera.y + wy * camera.zoom * ISO_Y_SCALE };
}
function screenToWorld(sx, sy) {
  return { x: (sx - camera.x) / camera.zoom, y: (sy - camera.y) / (camera.zoom * ISO_Y_SCALE) };
}
function tileScreenCorners(q, r) {
  const w = axialToWorld(q, r);
  const out = [];
  for (let i = 0; i < 6; i++) {
    const wo = HEX_CORNER_OFFSETS[i];
    out.push(worldToScreen(w.x + wo.x, w.y + wo.y));
  }
  return out;
}
function tileScreenCenter(q, r) {
  const w = axialToWorld(q, r);
  return worldToScreen(w.x, w.y);
}

// ============================================================
// RENDERER
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawTile(tile) {
  const corners = tileScreenCorners(tile.q, tile.r);
  const center = tileScreenCenter(tile.q, tile.r);
  const sz = HEX_SIZE * camera.zoom;
  const szY = sz * ISO_Y_SCALE;
  const depth = TILE_DEPTH * camera.zoom;
  const type = tile.type;
  const sinkY = type === TILE.WATER ? WATER_SINK * camera.zoom : 0;
  const topCorners = corners.map(c => ({ x: c.x, y: c.y + sinkY }));
  const topCenter = { x: center.x, y: center.y + sinkY };

  // Side wall — two faces for sun-from-upper-left shading
  const wallTop = topCorners;
  const wallBot = topCorners.map(c => ({ x: c.x, y: c.y + depth }));
  // Right-front face (1→2)
  ctx.beginPath();
  ctx.moveTo(wallTop[1].x, wallTop[1].y);
  ctx.lineTo(wallTop[2].x, wallTop[2].y);
  ctx.lineTo(wallBot[2].x, wallBot[2].y);
  ctx.lineTo(wallBot[1].x, wallBot[1].y);
  ctx.closePath();
  ctx.fillStyle = type.side; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.40)'; ctx.lineWidth = Math.max(0.5, 0.7 / camera.zoom); ctx.stroke();
  // Left-front face (2→3)
  ctx.beginPath();
  ctx.moveTo(wallTop[2].x, wallTop[2].y);
  ctx.lineTo(wallTop[3].x, wallTop[3].y);
  ctx.lineTo(wallBot[3].x, wallBot[3].y);
  ctx.lineTo(wallBot[2].x, wallBot[2].y);
  ctx.closePath();
  ctx.fillStyle = type.side; ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.20)'; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.40)'; ctx.lineWidth = Math.max(0.5, 0.7 / camera.zoom); ctx.stroke();

  // Hex top
  ctx.beginPath();
  ctx.moveTo(topCorners[0].x, topCorners[0].y);
  for (let i = 1; i < 6; i++) ctx.lineTo(topCorners[i].x, topCorners[i].y);
  ctx.closePath();
  ctx.fillStyle = type.top; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.30)'; ctx.lineWidth = Math.max(0.6, 1 / camera.zoom); ctx.stroke();

  // Right-half shading
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(topCorners[0].x, topCorners[0].y);
  ctx.lineTo(topCorners[1].x, topCorners[1].y);
  ctx.lineTo(topCenter.x, topCenter.y);
  ctx.lineTo(topCorners[5].x, topCorners[5].y);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fill();
  ctx.restore();

  // Features
  if (type === TILE.TREES) drawTreeCluster(topCenter.x, topCenter.y, sz, szY);
  else if (type === TILE.MOUNTAIN) drawMountain(topCenter.x, topCenter.y, sz, szY);
  else if (type === TILE.WATER) drawWaterShine(topCenter.x, topCenter.y, sz, szY);

  if (tile.hasVillage) drawVillage(topCenter.x, topCenter.y, sz, szY, tile.ownerPlayer);
}

function drawTreeCluster(cx, cy, sz, szY) {
  const positions = [
    { dx: -0.20, dy:  0.04, h: 0.38 },
    { dx:  0.22, dy:  0.08, h: 0.46 },
    { dx:  0.02, dy: -0.20, h: 0.42 },
  ];
  for (const p of positions) {
    const x = cx + p.dx * sz;
    const baseY = cy + p.dy * szY;
    const topY = baseY - p.h * sz;
    ctx.fillStyle = '#5b3a29';
    ctx.fillRect(x - sz * 0.04, baseY - sz * 0.10, sz * 0.08, sz * 0.10);
    ctx.beginPath();
    ctx.moveTo(x, topY);
    ctx.lineTo(x - sz * 0.18, baseY - sz * 0.06);
    ctx.lineTo(x + sz * 0.18, baseY - sz * 0.06);
    ctx.closePath();
    ctx.fillStyle = '#166534'; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom); ctx.stroke();
  }
}

function drawMountain(cx, cy, sz, szY) {
  const baseY = cy + szY * 0.12;
  const peakY = cy - sz * 0.70;
  const baseW = sz * 0.85;
  ctx.beginPath();
  ctx.moveTo(cx, peakY);
  ctx.lineTo(cx - baseW / 2, baseY);
  ctx.lineTo(cx + baseW / 2, baseY);
  ctx.closePath();
  ctx.fillStyle = '#7c6f5a'; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, peakY);
  ctx.lineTo(cx - baseW * 0.18, peakY + sz * 0.25);
  ctx.lineTo(cx + baseW * 0.18, peakY + sz * 0.25);
  ctx.closePath();
  ctx.fillStyle = '#f3f4f6'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx, peakY);
  ctx.lineTo(cx + baseW / 2, baseY);
  ctx.lineTo(cx, baseY);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fill();
}

function drawWaterShine(cx, cy, sz, szY) {
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth = Math.max(0.6, 1.2 / camera.zoom);
  ctx.beginPath(); ctx.moveTo(cx - sz * 0.32, cy - szY * 0.08); ctx.lineTo(cx + sz * 0.32, cy - szY * 0.08); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - sz * 0.18, cy + szY * 0.12); ctx.lineTo(cx + sz * 0.18, cy + szY * 0.12); ctx.stroke();
}

function drawVillage(cx, cy, sz, szY, ownerPlayer) {
  const wallW = sz * 0.46, wallH = sz * 0.30, roofH = sz * 0.24;
  const baseY = cy + szY * 0.10;
  const wallTop = baseY - wallH;
  const ownerColor = ownerPlayer !== null ? PLAYER_COLORS[ownerPlayer].dark : '#6b3e1f';
  const wallColor = ownerPlayer !== null ? '#f1f5f9' : '#c8a878';
  ctx.fillStyle = wallColor; ctx.fillRect(cx - wallW / 2, wallTop, wallW, wallH);
  ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fillRect(cx, wallTop, wallW / 2, wallH);
  ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
  ctx.strokeRect(cx - wallW / 2, wallTop, wallW, wallH);
  const overhang = sz * 0.05;
  ctx.beginPath(); ctx.moveTo(cx, wallTop - roofH); ctx.lineTo(cx - wallW / 2 - overhang, wallTop); ctx.lineTo(cx + wallW / 2 + overhang, wallTop); ctx.closePath();
  ctx.fillStyle = ownerColor; ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx, wallTop - roofH); ctx.lineTo(cx + wallW / 2 + overhang, wallTop); ctx.lineTo(cx, wallTop); ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
  ctx.beginPath(); ctx.moveTo(cx, wallTop - roofH); ctx.lineTo(cx - wallW / 2 - overhang, wallTop); ctx.lineTo(cx + wallW / 2 + overhang, wallTop); ctx.closePath(); ctx.stroke();
  const doorW = sz * 0.12, doorH = sz * 0.17;
  ctx.fillStyle = '#3c2410'; ctx.fillRect(cx - doorW / 2, baseY - doorH, doorW, doorH);
  if (ownerPlayer !== null) {
    const poleX = cx + wallW / 2 + overhang - sz * 0.02;
    const poleTop = wallTop - roofH - sz * 0.30;
    ctx.strokeStyle = '#4b5563'; ctx.lineWidth = Math.max(0.8, 1.2 / camera.zoom);
    ctx.beginPath(); ctx.moveTo(poleX, wallTop - roofH); ctx.lineTo(poleX, poleTop); ctx.stroke();
    ctx.fillStyle = '#facc15';
    ctx.beginPath(); ctx.moveTo(poleX, poleTop); ctx.lineTo(poleX + sz * 0.16, poleTop + sz * 0.04); ctx.lineTo(poleX, poleTop + sz * 0.10); ctx.closePath(); ctx.fill();
  }
}

function drawUnit(cx, cy, sz, szY, unit) {
  const baseY = cy + szY * 0.18;
  const color = PLAYER_COLORS[unit.player].body;
  const colorDark = PLAYER_COLORS[unit.player].dark;
  if (unit.type === 'warrior') {
    const bodyW = sz * 0.20, bodyH = sz * 0.28, headR = sz * 0.10;
    const bodyTop = baseY - bodyH;
    ctx.fillStyle = color; ctx.fillRect(cx - bodyW / 2, bodyTop, bodyW, bodyH);
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
    ctx.strokeRect(cx - bodyW / 2, bodyTop, bodyW, bodyH);
    ctx.beginPath(); ctx.arc(cx, bodyTop - headR + sz * 0.02, headR, 0, Math.PI * 2); ctx.closePath();
    ctx.fillStyle = '#fde68a'; ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, bodyTop - headR + sz * 0.02, headR, Math.PI, 2 * Math.PI); ctx.closePath();
    ctx.fillStyle = '#6b7280'; ctx.fill(); ctx.stroke();
    ctx.fillStyle = colorDark;
    ctx.fillRect(cx - bodyW / 2 - sz * 0.10, bodyTop + sz * 0.04, sz * 0.10, sz * 0.18);
    ctx.strokeRect(cx - bodyW / 2 - sz * 0.10, bodyTop + sz * 0.04, sz * 0.10, sz * 0.18);
  } else if (unit.type === 'rider') {
    const horseY = baseY - sz * 0.18, horseW = sz * 0.42, horseH = sz * 0.16;
    ctx.fillStyle = '#78350f'; ctx.fillRect(cx - horseW / 2, horseY, horseW, horseH);
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
    ctx.strokeRect(cx - horseW / 2, horseY, horseW, horseH);
    const legW = sz * 0.04, legH = sz * 0.10;
    ctx.fillStyle = '#78350f';
    ctx.fillRect(cx - horseW / 2 + sz * 0.02, horseY + horseH, legW, legH);
    ctx.fillRect(cx - horseW / 2 + sz * 0.10, horseY + horseH, legW, legH);
    ctx.fillRect(cx + horseW / 2 - sz * 0.06, horseY + horseH, legW, legH);
    ctx.fillRect(cx + horseW / 2 - sz * 0.14, horseY + horseH, legW, legH);
    ctx.fillRect(cx + horseW / 2 - sz * 0.02, horseY - sz * 0.06, sz * 0.10, sz * 0.10);
    ctx.strokeRect(cx + horseW / 2 - sz * 0.02, horseY - sz * 0.06, sz * 0.10, sz * 0.10);
    const riderW = sz * 0.14, riderH = sz * 0.18;
    const riderTop = horseY - riderH;
    ctx.fillStyle = color; ctx.fillRect(cx - riderW / 2 - sz * 0.04, riderTop, riderW, riderH);
    ctx.strokeRect(cx - riderW / 2 - sz * 0.04, riderTop, riderW, riderH);
    const riderHeadR = sz * 0.08;
    ctx.beginPath(); ctx.arc(cx - sz * 0.04, riderTop - riderHeadR + sz * 0.02, riderHeadR, 0, Math.PI * 2); ctx.closePath();
    ctx.fillStyle = '#fde68a'; ctx.fill(); ctx.stroke();
  }

  // HP bar above unit
  const stats = UNIT_STATS[unit.type];
  const barW = sz * 0.50;
  const barH = sz * 0.07;
  const barY = baseY - sz * 0.95;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(cx - barW / 2, barY, barW, barH);
  ctx.fillStyle = unit.hp / stats.hp > 0.5 ? '#22c55e' : (unit.hp / stats.hp > 0.25 ? '#eab308' : '#dc2626');
  ctx.fillRect(cx - barW / 2, barY, barW * (unit.hp / stats.hp), barH);
  ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = Math.max(0.4, 0.5 / camera.zoom);
  ctx.strokeRect(cx - barW / 2, barY, barW, barH);

  // Summoning sickness indicator (small grey dot)
  if (!unit.canMove && !unit.canAttack && !unit.hasMovedThisTurn) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.beginPath();
    ctx.arc(cx + sz * 0.30, barY + barH / 2, sz * 0.06, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#facc15';
    ctx.beginPath();
    ctx.arc(cx + sz * 0.30, barY + barH / 2, sz * 0.05, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHexRingAt(q, r, color, lineWidth, dashed) {
  const tile = game.tileAt(q, r);
  const raw = tileScreenCorners(q, r);
  const sinkY = tile && tile.type === TILE.WATER ? WATER_SINK * camera.zoom : 0;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  if (dashed) ctx.setLineDash([Math.max(3, 5 / camera.zoom), Math.max(3, 5 / camera.zoom)]);
  ctx.beginPath();
  ctx.moveTo(raw[0].x, raw[0].y + sinkY);
  for (let i = 1; i < 6; i++) ctx.lineTo(raw[i].x, raw[i].y + sinkY);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function drawHexFillAt(q, r, fillColor) {
  const tile = game.tileAt(q, r);
  const raw = tileScreenCorners(q, r);
  const sinkY = tile && tile.type === TILE.WATER ? WATER_SINK * camera.zoom : 0;
  ctx.save();
  ctx.fillStyle = fillColor;
  ctx.beginPath();
  ctx.moveTo(raw[0].x, raw[0].y + sinkY);
  for (let i = 1; i < 6; i++) ctx.lineTo(raw[i].x, raw[i].y + sinkY);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function draw() {
  ctx.fillStyle = '#0b1220';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Compute fog visibility for current player
  const visible = visibilityForPlayer(game, game.currentPlayer);

  const sorted = [...game.map.tiles].sort((a, b) => {
    const aw = axialToWorld(a.q, a.r);
    const bw = axialToWorld(b.q, b.r);
    return aw.y - bw.y;
  });
  for (const t of sorted) drawTile(t);

  // SC2-style fog overlay — dim non-visible tiles (terrain still readable)
  for (const t of game.map.tiles) {
    if (!isVisible(visible, t.q, t.r)) {
      drawHexFillAt(t.q, t.r, 'rgba(11, 18, 32, 0.48)');
    }
  }

  // Territory rings around each owned village (player color)
  for (const t of game.map.tiles) {
    if (t.hasVillage && t.ownerPlayer !== null) {
      const color = PLAYER_COLORS[t.ownerPlayer].body;
      // Thick solid ring around the village tile itself
      drawHexRingAt(t.q, t.r, color, Math.max(2.5, 3 / camera.zoom), false);
      // Dashed ring on each adjacent hex (1-tile territory)
      for (const n of neighborsOf(t.q, t.r)) {
        const adj = game.tileAt(n.q, n.r);
        if (!adj) continue;
        ctx.save();
        ctx.globalAlpha = 0.7;
        drawHexRingAt(n.q, n.r, color, Math.max(1.5, 2 / camera.zoom), true);
        ctx.restore();
      }
    }
  }

  // Units (filter enemy units by visibility)
  const sortedUnits = [...game.units].sort((a, b) => {
    const aw = axialToWorld(a.q, a.r);
    const bw = axialToWorld(b.q, b.r);
    return aw.y - bw.y;
  });
  for (const u of sortedUnits) {
    if (u.player !== game.currentPlayer && !isVisible(visible, u.q, u.r)) continue;
    const c = tileScreenCenter(u.q, u.r);
    const sinkY = game.tileAt(u.q, u.r).type === TILE.WATER ? WATER_SINK * camera.zoom : 0;
    drawUnit(c.x, c.y + sinkY, HEX_SIZE * camera.zoom, HEX_SIZE * camera.zoom * ISO_Y_SCALE, u);
  }

  // Selection highlights
  if (game.selected && game.selected.kind === 'unit') {
    const u = game.unitAt(game.selected.q, game.selected.r);
    if (u && u.player === game.currentPlayer) {
      if (u.canMove) {
        const moves = reachableTiles(game, u);
        for (const m of moves) drawHexFillAt(m.q, m.r, 'rgba(34,197,94,0.30)');
      }
      if (u.canAttack) {
        const atks = attackableTiles(game, u);
        for (const a of atks) drawHexFillAt(a.q, a.r, 'rgba(250,204,21,0.45)');
      }
      drawHexRingAt(u.q, u.r, '#facc15', 3, false);
    }
  }
  if (game.selected && game.selected.kind === 'village') {
    drawHexRingAt(game.selected.q, game.selected.r, '#facc15', 3, false);
  }
}

// ============================================================
// INPUT — pan, pinch zoom, tap
// ============================================================
function tileAtScreen(sx, sy) {
  const w = screenToWorld(sx, sy);
  let best = null, bestDist = Infinity;
  for (const t of game.map.tiles) {
    const tw = axialToWorld(t.q, t.r);
    const d = Math.hypot(w.x - tw.x, w.y - tw.y);
    if (d < bestDist) { bestDist = d; best = t; }
  }
  if (bestDist < HEX_SIZE * 1.05) return best;
  return null;
}

const pointers = new Map();
let pinchBaseDist = 0, pinchBaseZoom = 1, pinchBaseCenter = { x: 0, y: 0 };
let panBase = null, didDrag = false;

function pointerDown(e) {
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  didDrag = false;
  if (pointers.size === 1) panBase = { x: e.clientX, y: e.clientY, camX: camera.x, camY: camera.y };
  else if (pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    pinchBaseDist = Math.hypot(a.x - b.x, a.y - b.y);
    pinchBaseZoom = camera.zoom;
    pinchBaseCenter = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
  }
}
function pointerMove(e) {
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size === 1 && panBase) {
    const dx = e.clientX - panBase.x, dy = e.clientY - panBase.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
    camera.x = panBase.camX + dx; camera.y = panBase.camY + dy;
    draw();
  } else if (pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    const newDist = Math.hypot(a.x - b.x, a.y - b.y);
    if (pinchBaseDist > 0) {
      const newZoom = clamp(pinchBaseZoom * (newDist / pinchBaseDist), 0.4, 3.0);
      const cx = pinchBaseCenter.x, cy = pinchBaseCenter.y;
      const ratio = newZoom / camera.zoom;
      camera.x = cx - (cx - camera.x) * ratio;
      camera.y = cy - (cy - camera.y) * ratio;
      camera.zoom = newZoom;
      didDrag = true;
      draw();
    }
  }
}
function pointerUp(e) {
  const wasOnePointer = pointers.size === 1;
  pointers.delete(e.pointerId);
  if (pointers.size === 0) {
    if (wasOnePointer && !didDrag) handleTap(e.clientX, e.clientY);
    panBase = null;
  } else if (pointers.size === 1) {
    const [p] = [...pointers.values()];
    panBase = { x: p.x, y: p.y, camX: camera.x, camY: camera.y };
  }
}
function pointerCancel(e) {
  pointers.delete(e.pointerId);
  if (pointers.size === 0) panBase = null;
}
function wheel(e) {
  e.preventDefault();
  const dir = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  const newZoom = clamp(camera.zoom * dir, 0.4, 3.0);
  const ratio = newZoom / camera.zoom;
  camera.x = e.clientX - (e.clientX - camera.x) * ratio;
  camera.y = e.clientY - (e.clientY - camera.y) * ratio;
  camera.zoom = newZoom;
  draw();
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
canvas.addEventListener('pointerdown', pointerDown);
canvas.addEventListener('pointermove', pointerMove);
canvas.addEventListener('pointerup', pointerUp);
canvas.addEventListener('pointercancel', pointerCancel);
canvas.addEventListener('wheel', wheel, { passive: false });

// ============================================================
// TAP DISPATCH
// ============================================================
function handleTap(sx, sy) {
  if (game.phase !== 'play') return;
  const tile = tileAtScreen(sx, sy);
  if (!tile) {
    clearSelection();
    return;
  }
  // Currently selected unit → attempt move or attack
  if (game.selected && game.selected.kind === 'unit') {
    const sel = game.unitAt(game.selected.q, game.selected.r);
    if (sel && sel.player === game.currentPlayer) {
      const targetUnit = game.unitAt(tile.q, tile.r);
      if (targetUnit && targetUnit.player !== sel.player) {
        // Attack
        const events = attackUnit(game, sel, targetUnit);
        if (events) {
          showCombatToast(events[0]);
          clearSelection();
          checkWin();
          updateAll();
          return;
        }
      } else if (!targetUnit && sel.canMove) {
        // Move
        if (moveUnit(game, sel, tile.q, tile.r)) {
          // Keep selection so the player sees the unit can still attack (Rider Dash)
          game.selected = { kind: 'unit', q: sel.q, r: sel.r };
          updateAll();
          return;
        }
      }
    }
  }

  // Select friendly unit
  const u = game.unitAt(tile.q, tile.r);
  if (u && u.player === game.currentPlayer) {
    game.selected = { kind: 'unit', q: tile.q, r: tile.r };
    updateAll();
    return;
  }

  // Select own village
  if (tile.hasVillage && tile.ownerPlayer === game.currentPlayer) {
    game.selected = { kind: 'village', q: tile.q, r: tile.r };
    updateAll();
    return;
  }

  // Otherwise clear
  clearSelection();
}

function clearSelection() {
  game.selected = null;
  updateAll();
}

// ============================================================
// UI WIRING
// ============================================================
const seedInput = document.getElementById('seedInput');
const newGameBtn = document.getElementById('newGameBtn');
const endTurnBtn = document.getElementById('endTurnBtn');
const turnPill = document.getElementById('turnPill');
const hoverPill = document.getElementById('hoverPill');
const actionPicker = document.getElementById('actionPicker');
const apTitle = document.getElementById('apTitle');
const apSub = document.getElementById('apSub');
const makeWarriorBtn = document.getElementById('makeWarriorBtn');
const makeRiderBtn = document.getElementById('makeRiderBtn');
const apCloseBtn = document.getElementById('apCloseBtn');
const passOverlay = document.getElementById('passOverlay');
const passTitle = document.getElementById('passTitle');
const passBtn = document.getElementById('passBtn');
const winOverlay = document.getElementById('winOverlay');
const winTitle = document.getElementById('winTitle');
const winSub = document.getElementById('winSub');
const winRestartBtn = document.getElementById('winRestartBtn');
const combatToast = document.getElementById('combatToast');

let game = newGame(1);
startTurn(game);

function updateTopBar() {
  const cp = game.currentPlayer;
  const pc = PLAYER_COLORS[cp];
  turnPill.textContent = `${pc.short} · ${game.players[cp].stars}★ · Turn ${game.turn}`;
  turnPill.className = `pill ${cp === 0 ? 'p1' : 'p2'}`;
  endTurnBtn.className = cp === 1 ? 'p2' : '';
  endTurnBtn.textContent = `End ${pc.short} Turn`;
}

function updateHoverPill() {
  if (game.selected && game.selected.kind === 'unit') {
    const u = game.unitAt(game.selected.q, game.selected.r);
    if (u) {
      const stats = UNIT_STATS[u.type];
      const status = u.canMove || u.canAttack ? '' : ' (used)';
      const sick = !u.canMove && !u.canAttack && !u.hasMovedThisTurn ? ' (sickness)' : '';
      hoverPill.textContent = `${PLAYER_COLORS[u.player].short} ${stats.label} · ${u.hp}/${stats.hp} HP${status}${sick}`;
      return;
    }
  }
  if (game.selected && game.selected.kind === 'village') {
    const v = game.villageAt(game.selected.q, game.selected.r);
    if (v) {
      hoverPill.textContent = `My village · empty: ${!game.unitAt(v.q, v.r)}`;
      return;
    }
  }
  hoverPill.textContent = 'tap your unit or village';
}

function updateActionPicker() {
  if (game.selected && game.selected.kind === 'village') {
    const v = game.villageAt(game.selected.q, game.selected.r);
    if (v && v.ownerPlayer === game.currentPlayer) {
      actionPicker.style.display = 'block';
      const empty = !game.unitAt(v.q, v.r);
      const stars = game.players[game.currentPlayer].stars;
      apTitle.textContent = `${PLAYER_COLORS[game.currentPlayer].short} Village`;
      apSub.textContent = empty ? `Train a unit (${stars}★ available)` : 'A unit is here';
      makeWarriorBtn.disabled = !empty || stars < UNIT_STATS.warrior.cost;
      makeRiderBtn.disabled = !empty || stars < UNIT_STATS.rider.cost;
      return;
    }
  }
  actionPicker.style.display = 'none';
}

function updateAll() {
  updateTopBar();
  updateHoverPill();
  updateActionPicker();
  draw();
}

makeWarriorBtn.addEventListener('click', () => {
  if (!game.selected) return;
  const v = game.villageAt(game.selected.q, game.selected.r);
  if (v && trainUnit(game, v, 'warrior')) updateAll();
});
makeRiderBtn.addEventListener('click', () => {
  if (!game.selected) return;
  const v = game.villageAt(game.selected.q, game.selected.r);
  if (v && trainUnit(game, v, 'rider')) updateAll();
});
apCloseBtn.addEventListener('click', () => { clearSelection(); });

endTurnBtn.addEventListener('click', () => {
  if (game.phase !== 'play') return;
  endTurn(game);
  if (game.phase === 'won') {
    showWin();
    return;
  }
  showPassScreen();
});

function showCombatToast(ev) {
  const a = UNIT_STATS[ev.attackerType].label;
  const d = UNIT_STATS[ev.defenderType].label;
  let msg = `${a} hit ${d} for ${ev.defenderDamage}`;
  if (ev.attackerDamage > 0) msg += `, took ${ev.attackerDamage} back`;
  if (ev.defenderKilled) msg += ` — killed!`;
  if (ev.attackerKilled) msg += ` — and died`;
  combatToast.textContent = msg;
  combatToast.classList.add('show');
  setTimeout(() => combatToast.classList.remove('show'), 2200);
}

function showPassScreen() {
  const next = game.currentPlayer;
  const pc = PLAYER_COLORS[next];
  passTitle.textContent = `Pass to ${pc.label}`;
  passBtn.textContent = `I'm ${pc.label} — start turn`;
  passBtn.className = next === 0 ? '' : 'p2';
  passOverlay.style.display = 'flex';
}
passBtn.addEventListener('click', () => {
  passOverlay.style.display = 'none';
  game.phase = 'play';
  startTurn(game);
  updateAll();
});

function showWin() {
  const pc = PLAYER_COLORS[game.winner];
  winTitle.textContent = `${pc.label} wins!`;
  winSub.textContent = `Captured the opposing village.`;
  winOverlay.style.display = 'flex';
}
function checkWin() {
  for (let p = 0; p < 2; p++) {
    const opp = 1 - p;
    const oppOwns = game.map.tiles.some(t => t.hasVillage && t.ownerPlayer === opp);
    const oppUnits = game.units.some(u => u.player === opp);
    if (!oppOwns && !oppUnits) {
      game.phase = 'won';
      game.winner = p;
      showWin();
      return;
    }
  }
}
winRestartBtn.addEventListener('click', () => {
  winOverlay.style.display = 'none';
  startNewGame();
});

function startNewGame() {
  const seedStr = seedInput.value;
  let seed = parseInt(seedStr, 10);
  if (!Number.isFinite(seed)) seed = Math.floor(Math.random() * 1e9);
  game = newGame(seed);
  startTurn(game);
  seedInput.value = String(seed);
  camera.reset();
  updateAll();
}
newGameBtn.addEventListener('click', () => {
  const n = Math.floor(Math.random() * 1e9);
  seedInput.value = String(n);
  startNewGame();
});
seedInput.addEventListener('change', startNewGame);

// ============================================================
// BOOT
// ============================================================
window.addEventListener('resize', () => { resizeCanvas(); camera.recenter(); draw(); });
resizeCanvas();
camera.reset();
seedInput.value = '1';
updateAll();

</script>
</body>
</html>
