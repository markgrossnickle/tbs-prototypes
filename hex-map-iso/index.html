<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>TBS Hex Map — Iso Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: #111a2e;
      --line: #1f2a44;
      --text: #e6ecff;
      --muted: #8b9bbf;
      --accent: #6ee7b7;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overscroll-behavior: none; touch-action: none; }
    #canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; background: var(--bg); }
    #ui {
      position: fixed;
      top: env(safe-area-inset-top, 8px);
      left: env(safe-area-inset-left, 8px);
      right: env(safe-area-inset-right, 8px);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: none;
      padding: 4px;
    }
    .pill { pointer-events: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 999px; padding: 6px 10px; font-size: 12px; color: var(--text); }
    .pill.muted { color: var(--muted); }
    button.pill { cursor: pointer; user-select: none; }
    button.pill:active { transform: scale(0.97); }
    #seedInput { background: var(--bg); color: var(--text); border: 1px solid var(--line); border-radius: 999px; padding: 4px 8px; width: 90px; font-size: 12px; }
    #legend {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 8px) + 4px);
      left: env(safe-area-inset-left, 8px);
      right: env(safe-area-inset-right, 8px);
      display: flex;
      justify-content: center;
      pointer-events: none;
    }
    #legendInner { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 6px 10px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
    .swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid #0006; }
    @media (max-width: 480px) {
      .pill { font-size: 11px; padding: 5px 8px; }
      #seedInput { width: 70px; }
      .legend-item { font-size: 10px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <div class="pill"><strong>Hex map</strong> <span class="muted" id="dimsLabel">radius 6 (91 tiles)</span></div>
    <label class="pill"><span class="muted">seed</span>&nbsp;<input id="seedInput" type="text" inputmode="numeric" pattern="[0-9]*" /></label>
    <button class="pill" id="rerollBtn">Reroll</button>
    <button class="pill" id="resetViewBtn">Reset view</button>
    <span class="pill muted" id="hoverLabel">—</span>
  </div>

  <div id="legend">
    <div id="legendInner">
      <div class="legend-item"><div class="swatch" style="background:#2563eb"></div>water</div>
      <div class="legend-item"><div class="swatch" style="background:#86efac"></div>plains</div>
      <div class="legend-item"><div class="swatch" style="background:#15803d"></div>trees</div>
      <div class="legend-item"><div class="swatch" style="background:#7c6f5a"></div>mountain</div>
      <div class="legend-item"><div class="swatch" style="background:#9a3412"></div>village</div>
    </div>
  </div>

<script>
'use strict';

// ============================================================
// PROTOTYPE v2: hex-shaped board (radius 6 = 91 tiles)
// ------------------------------------------------------------
// Flat-top hex layout, axial coords centered at origin.
// Board shape = hexagon (not rectangle) so it's not slanted.
// Tiles tessellate perfectly: corners computed in WORLD space
// then projected to screen with the iso Y-squash applied
// uniformly. No overlap, no gaps.
// Iso squash dialled to 0.85 (mild — "slightly iso").
// Mountains / trees / water shimmers render above each tile.
// Mobile: 1-finger pan, 2-finger pinch zoom, tap to select.
// ============================================================

// ---- Seeded RNG (mulberry32) — deterministic across reloads ----
function mulberry32(seed) {
  let s = seed >>> 0;
  return function () {
    s |= 0; s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ---- Board params ----
const BOARD_RADIUS = 6;       // hex radius from center; radius N => 3N^2 + 3N + 1 tiles
                              // r=6 => 127 if rectangular bounding, but hex shape = 91 tiles
const HEX_SIZE = 36;          // world-pixel "radius" of a hex (center to corner)
const ISO_Y_SCALE = 0.68;     // 1.0 = top-down, ~0.5 = true isometric (30° pitch)
const TILE_DEPTH = 14;        // pixel depth of the tile "side" at zoom 1 — makes 3D block read
const WATER_SINK = 7;         // water tiles render this many px lower than land surface
const VILLAGE_TARGET = 8;     // approx number of villages per board (Polytopia-like density)
const VILLAGE_MIN_DIST = 2;   // min hex distance between any two villages

// ---- Tile types ----
const TILE = {
  WATER:    { id: 'water',    top: '#2563eb', side: '#1e3a8a', label: 'water' },
  PLAINS:   { id: 'plains',   top: '#86efac', side: '#4d7c4f', label: 'plains' },
  TREES:    { id: 'trees',    top: '#15803d', side: '#14532d', label: 'trees' },
  MOUNTAIN: { id: 'mountain', top: '#a8a29e', side: '#57534e', label: 'mountain' },
};

// ---- Hex distance (axial → cube) ----
function hexDistance(q1, r1, q2, r2) {
  const s1 = -q1 - r1, s2 = -q2 - r2;
  return Math.max(Math.abs(q1 - q2), Math.abs(r1 - r2), Math.abs(s1 - s2));
}

// ============================================================
// Hex board generation
// ------------------------------------------------------------
// Axial coords (q, r) centered at origin. Hex-shape filter:
//   include (q, r) where max(|q|, |r|, |-q-r|) <= radius
// ============================================================
function hexAxialsForRadius(radius) {
  const tiles = [];
  for (let q = -radius; q <= radius; q++) {
    for (let r = -radius; r <= radius; r++) {
      const s = -q - r;
      if (Math.max(Math.abs(q), Math.abs(r), Math.abs(s)) <= radius) {
        tiles.push({ q, r });
      }
    }
  }
  return tiles;
}

function generateMap(seed, radius) {
  const rng = mulberry32(seed);
  const cells = hexAxialsForRadius(radius);

  // Drop seed "centers" for each terrain type in axial space
  function pickAxialPoints(n) {
    const pts = [];
    for (let i = 0; i < n; i++) {
      pts.push({
        q: (rng() * 2 - 1) * radius,
        r: (rng() * 2 - 1) * radius,
      });
    }
    return pts;
  }

  const waterCenters = pickAxialPoints(3);
  const treeCenters  = pickAxialPoints(5);
  const mountainCenters = pickAxialPoints(3);

  const tiles = cells.map(({ q, r }) => {
    const waterScore = minAxialDistance(q, r, waterCenters) + 0.5 * rng();
    const treeScore  = minAxialDistance(q, r, treeCenters)  + 0.6 * rng();
    const mountScore = minAxialDistance(q, r, mountainCenters) + 0.4 * rng();

    let type = TILE.PLAINS;
    if (waterScore < 1.6) type = TILE.WATER;
    else if (mountScore < 1.5) type = TILE.MOUNTAIN;
    else if (treeScore < 1.8) type = TILE.TREES;

    // Edge bias: outer ring pulls toward water so the board reads as
    // an island rather than abrupt cropping
    const s = -q - r;
    const ringDist = radius - Math.max(Math.abs(q), Math.abs(r), Math.abs(s));
    if (ringDist === 0 && rng() < 0.55) type = TILE.WATER;
    else if (ringDist === 1 && rng() < 0.22) type = TILE.WATER;

    return { q, r, type, hasVillage: false };
  });

  // Village placement: pick plains tiles, spaced at least VILLAGE_MIN_DIST hexes apart.
  // Shuffle the candidate list with the seeded RNG so placement is deterministic.
  const candidates = tiles.filter(t => t.type === TILE.PLAINS).slice();
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  const villages = [];
  for (const c of candidates) {
    if (villages.length >= VILLAGE_TARGET) break;
    const ok = villages.every(v => hexDistance(v.q, v.r, c.q, c.r) >= VILLAGE_MIN_DIST);
    if (ok) { villages.push(c); c.hasVillage = true; }
  }

  return { radius, tiles, seed, villages: villages.length };
}

function minAxialDistance(q, r, points) {
  let best = Infinity;
  for (const p of points) {
    // Approximate axial distance via cube-distance formula
    const d = Math.max(
      Math.abs(q - p.q),
      Math.abs(r - p.r),
      Math.abs((q + r) - (p.q + p.r))
    );
    if (d < best) best = d;
  }
  return best;
}

// ============================================================
// Hex math (flat-top axial → world coords)
// ------------------------------------------------------------
// For flat-top hex with "size" = corner radius:
//   width  = 2 * size
//   height = sqrt(3) * size
//   x = size * 1.5 * q
//   y = size * sqrt(3) * (r + q/2)
// Corners at angles 0°, 60°, ..., 300° relative to center.
// ============================================================
const SQRT3 = Math.sqrt(3);

function axialToWorld(q, r) {
  return {
    x: HEX_SIZE * 1.5 * q,
    y: HEX_SIZE * SQRT3 * (r + q / 2),
  };
}

function flatTopCornerOffsets() {
  // Cached at module level — pure geometry, same every call
  const offsets = [];
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 180) * (60 * i);
    offsets.push({ x: HEX_SIZE * Math.cos(a), y: HEX_SIZE * Math.sin(a) });
  }
  return offsets;
}
const HEX_CORNER_OFFSETS = flatTopCornerOffsets();

// ============================================================
// Camera (pan + pinch zoom)
//   World coords = unsquashed hex coords centered on origin.
//   Screen coords = camera offset + (world * zoom), with Y
//   scaled by ISO_Y_SCALE uniformly — so positions AND hex
//   geometry are squashed the same amount. Tessellation holds.
// ============================================================
const camera = {
  x: 0, y: 0,    // pan offset in screen coords
  zoom: 1,
  reset() { this.zoom = 1; this.recenter(); },
  recenter() {
    // World origin is at the center of the board (hex board centered on (0,0)).
    // Recenter: world (0,0) → screen center.
    this.x = canvas.width / dpr / 2;
    this.y = canvas.height / dpr / 2;
  }
};

function worldToScreen(wx, wy) {
  return {
    x: camera.x + wx * camera.zoom,
    y: camera.y + wy * camera.zoom * ISO_Y_SCALE,
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - camera.x) / camera.zoom,
    y: (sy - camera.y) / (camera.zoom * ISO_Y_SCALE),
  };
}

// Get the 6 screen corners of a tile (flat-top, projected through camera).
// Corners are computed in world space (perfect tessellation), then projected.
function tileScreenCorners(q, r) {
  const w = axialToWorld(q, r);
  const out = [];
  for (let i = 0; i < 6; i++) {
    const wo = HEX_CORNER_OFFSETS[i];
    out.push(worldToScreen(w.x + wo.x, w.y + wo.y));
  }
  return out;
}

function tileScreenCenter(q, r) {
  const w = axialToWorld(q, r);
  return worldToScreen(w.x, w.y);
}

// ============================================================
// Renderer
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawTile(tile) {
  const corners = tileScreenCorners(tile.q, tile.r);
  const center = tileScreenCenter(tile.q, tile.r);
  const sz = HEX_SIZE * camera.zoom;          // for feature sizing
  const szY = sz * ISO_Y_SCALE;               // for vertical feature sizing
  const depth = TILE_DEPTH * camera.zoom;
  const type = tile.type;

  // Water sits lower than land — apply Y offset to corners + center
  const sinkY = type === TILE.WATER ? WATER_SINK * camera.zoom : 0;
  const topCorners = corners.map(c => ({ x: c.x, y: c.y + sinkY }));
  const topCenter = { x: center.x, y: center.y + sinkY };

  // ---- Side wall ----
  // For a flat-top hex (corners 0° right, then CCW), the bottom-front
  // edge is corners 1 (60°), 2 (120°), 3 (180°). Drop those corners by
  // `depth` to form the visible front wall.
  // Two sub-faces with different shading: left-front (1→2) and
  // right-front (2→3) — fakes a sun-from-upper-left lighting.
  // For water, render a shallow well so it looks recessed.
  const wallTop = topCorners;
  const wallBot = topCorners.map(c => ({ x: c.x, y: c.y + depth }));

  // Right-front face (corner 1 → 2)
  ctx.beginPath();
  ctx.moveTo(wallTop[1].x, wallTop[1].y);
  ctx.lineTo(wallTop[2].x, wallTop[2].y);
  ctx.lineTo(wallBot[2].x, wallBot[2].y);
  ctx.lineTo(wallBot[1].x, wallBot[1].y);
  ctx.closePath();
  ctx.fillStyle = type.side;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.40)';
  ctx.lineWidth = Math.max(0.5, 0.7 / camera.zoom);
  ctx.stroke();

  // Left-front face (corner 2 → 3) — slightly darker (shadowed)
  ctx.beginPath();
  ctx.moveTo(wallTop[2].x, wallTop[2].y);
  ctx.lineTo(wallTop[3].x, wallTop[3].y);
  ctx.lineTo(wallBot[3].x, wallBot[3].y);
  ctx.lineTo(wallBot[2].x, wallBot[2].y);
  ctx.closePath();
  ctx.fillStyle = type.side;
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.20)'; // shadow tint on the left face
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.40)';
  ctx.lineWidth = Math.max(0.5, 0.7 / camera.zoom);
  ctx.stroke();

  // ---- Hex top ----
  ctx.beginPath();
  ctx.moveTo(topCorners[0].x, topCorners[0].y);
  for (let i = 1; i < 6; i++) ctx.lineTo(topCorners[i].x, topCorners[i].y);
  ctx.closePath();
  ctx.fillStyle = type.top;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.30)';
  ctx.lineWidth = Math.max(0.6, 1 / camera.zoom);
  ctx.stroke();

  // Subtle directional shading on the top — slightly darker on the
  // right side to fake a sun-from-upper-left light. A thin overlay
  // gradient is overkill; instead drop a soft right-side tint via
  // a semi-transparent polygon over the right half of the hex.
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(topCorners[0].x, topCorners[0].y);   // right
  ctx.lineTo(topCorners[1].x, topCorners[1].y);   // upper-right
  ctx.lineTo(topCenter.x, topCenter.y);
  ctx.lineTo(topCorners[5].x, topCorners[5].y);   // lower-right
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fill();
  ctx.restore();

  // ---- Feature billboards ----
  // Drawn from the sunken (water) or surface (land) top center
  if (type === TILE.TREES) drawTreeCluster(topCenter.x, topCenter.y, sz, szY);
  else if (type === TILE.MOUNTAIN) drawMountain(topCenter.x, topCenter.y, sz, szY);
  else if (type === TILE.WATER) drawWaterShine(topCenter.x, topCenter.y, sz, szY);

  // Village on plains
  if (tile.hasVillage && type === TILE.PLAINS) drawVillage(topCenter.x, topCenter.y, sz, szY);
}

function drawVillage(cx, cy, sz, szY) {
  // Small hut: rectangular wall + triangular roof + door.
  // Sized to read at thumbnail and at zoom.
  const wallW = sz * 0.46;
  const wallH = sz * 0.30;
  const roofH = sz * 0.24;
  const baseY = cy + szY * 0.10;
  const wallTop = baseY - wallH;

  // Wall (front face)
  ctx.fillStyle = '#e8c79a';
  ctx.fillRect(cx - wallW / 2, wallTop, wallW, wallH);
  // Right-side shadow on wall
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.fillRect(cx, wallTop, wallW / 2, wallH);
  // Wall outline
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
  ctx.strokeRect(cx - wallW / 2, wallTop, wallW, wallH);

  // Roof (gable triangle, slight overhang)
  const overhang = sz * 0.05;
  ctx.beginPath();
  ctx.moveTo(cx, wallTop - roofH);
  ctx.lineTo(cx - wallW / 2 - overhang, wallTop);
  ctx.lineTo(cx + wallW / 2 + overhang, wallTop);
  ctx.closePath();
  ctx.fillStyle = '#9a3412';
  ctx.fill();
  // Right-side shadow on roof
  ctx.beginPath();
  ctx.moveTo(cx, wallTop - roofH);
  ctx.lineTo(cx + wallW / 2 + overhang, wallTop);
  ctx.lineTo(cx, wallTop);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
  ctx.beginPath();
  ctx.moveTo(cx, wallTop - roofH);
  ctx.lineTo(cx - wallW / 2 - overhang, wallTop);
  ctx.lineTo(cx + wallW / 2 + overhang, wallTop);
  ctx.closePath();
  ctx.stroke();

  // Door
  const doorW = sz * 0.12;
  const doorH = sz * 0.17;
  ctx.fillStyle = '#3c2410';
  ctx.fillRect(cx - doorW / 2, baseY - doorH, doorW, doorH);
}

function drawTreeCluster(cx, cy, sz, szY) {
  // 3 small trees, slightly offset, with trunk + foliage triangle
  const positions = [
    { dx: -0.20, dy:  0.04, h: 0.38 },
    { dx:  0.22, dy:  0.08, h: 0.46 },
    { dx:  0.02, dy: -0.20, h: 0.42 },
  ];
  for (const p of positions) {
    const x = cx + p.dx * sz;
    const baseY = cy + p.dy * szY;
    const topY = baseY - p.h * sz; // trees stand UP in screen space, full height
    // Trunk
    ctx.fillStyle = '#5b3a29';
    ctx.fillRect(x - sz * 0.04, baseY - sz * 0.10, sz * 0.08, sz * 0.10);
    // Foliage (triangle)
    ctx.beginPath();
    ctx.moveTo(x, topY);
    ctx.lineTo(x - sz * 0.18, baseY - sz * 0.06);
    ctx.lineTo(x + sz * 0.18, baseY - sz * 0.06);
    ctx.closePath();
    ctx.fillStyle = '#166534';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
    ctx.stroke();
  }
}

function drawMountain(cx, cy, sz, szY) {
  // Single triangular peak with snow cap and shaded side
  const baseY = cy + szY * 0.12;
  const peakY = cy - sz * 0.70;
  const baseW = sz * 0.85;
  // Body
  ctx.beginPath();
  ctx.moveTo(cx, peakY);
  ctx.lineTo(cx - baseW / 2, baseY);
  ctx.lineTo(cx + baseW / 2, baseY);
  ctx.closePath();
  ctx.fillStyle = '#7c6f5a';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
  ctx.stroke();
  // Snow cap (top ~30%)
  ctx.beginPath();
  ctx.moveTo(cx, peakY);
  ctx.lineTo(cx - baseW * 0.18, peakY + sz * 0.25);
  ctx.lineTo(cx + baseW * 0.18, peakY + sz * 0.25);
  ctx.closePath();
  ctx.fillStyle = '#f3f4f6';
  ctx.fill();
  // Shadow on right face
  ctx.beginPath();
  ctx.moveTo(cx, peakY);
  ctx.lineTo(cx + baseW / 2, baseY);
  ctx.lineTo(cx, baseY);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fill();
}

function drawWaterShine(cx, cy, sz, szY) {
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth = Math.max(0.6, 1.2 / camera.zoom);
  ctx.beginPath();
  ctx.moveTo(cx - sz * 0.32, cy - szY * 0.08);
  ctx.lineTo(cx + sz * 0.32, cy - szY * 0.08);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - sz * 0.18, cy + szY * 0.12);
  ctx.lineTo(cx + sz * 0.18, cy + szY * 0.12);
  ctx.stroke();
}

// ============================================================
// Frame
// ============================================================
let map = generateMap(1, BOARD_RADIUS);
let hovered = null;

function draw() {
  ctx.fillStyle = '#0b1220';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Render order: back (small projected y) first, front later, so
  // mountain peaks and tile sides correctly overlap.
  const sorted = [...map.tiles].sort((a, b) => {
    const aw = axialToWorld(a.q, a.r);
    const bw = axialToWorld(b.q, b.r);
    return aw.y - bw.y;
  });

  for (const t of sorted) drawTile(t);

  // Selected ring — follows the visible top edge (apply WATER_SINK for water)
  if (hovered) {
    const raw = tileScreenCorners(hovered.q, hovered.r);
    const sinkY = hovered.type === TILE.WATER ? WATER_SINK * camera.zoom : 0;
    ctx.beginPath();
    ctx.moveTo(raw[0].x, raw[0].y + sinkY);
    for (let i = 1; i < 6; i++) ctx.lineTo(raw[i].x, raw[i].y + sinkY);
    ctx.closePath();
    ctx.strokeStyle = '#fcd34d';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }
}

// ============================================================
// Hit-testing (screen → tile)
// ============================================================
function tileAtScreen(sx, sy) {
  const w = screenToWorld(sx, sy);
  let best = null;
  let bestDist = Infinity;
  for (const t of map.tiles) {
    const tw = axialToWorld(t.q, t.r);
    const d = Math.hypot(w.x - tw.x, w.y - tw.y);
    if (d < bestDist) { bestDist = d; best = t; }
  }
  if (bestDist < HEX_SIZE * 1.05) return best;
  return null;
}

// ============================================================
// Pointer handling — 1 finger pan/tap, 2 fingers pinch zoom
// ============================================================
const pointers = new Map();
let pinchBaseDist = 0;
let pinchBaseZoom = 1;
let pinchBaseCenter = { x: 0, y: 0 };
let panBase = null;
let didDrag = false;

function pointerDown(e) {
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  didDrag = false;
  if (pointers.size === 1) {
    panBase = { x: e.clientX, y: e.clientY, camX: camera.x, camY: camera.y };
  } else if (pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    pinchBaseDist = Math.hypot(a.x - b.x, a.y - b.y);
    pinchBaseZoom = camera.zoom;
    pinchBaseCenter = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
  }
}

function pointerMove(e) {
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size === 1 && panBase) {
    const dx = e.clientX - panBase.x;
    const dy = e.clientY - panBase.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
    camera.x = panBase.camX + dx;
    camera.y = panBase.camY + dy;
    draw();
  } else if (pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    const newDist = Math.hypot(a.x - b.x, a.y - b.y);
    if (pinchBaseDist > 0) {
      const newZoom = clamp(pinchBaseZoom * (newDist / pinchBaseDist), 0.4, 3.0);
      const cx = pinchBaseCenter.x;
      const cy = pinchBaseCenter.y;
      const ratio = newZoom / camera.zoom;
      camera.x = cx - (cx - camera.x) * ratio;
      camera.y = cy - (cy - camera.y) * ratio;
      camera.zoom = newZoom;
      didDrag = true;
      draw();
    }
  }
}

function pointerUp(e) {
  const wasOnePointer = pointers.size === 1;
  pointers.delete(e.pointerId);
  if (pointers.size === 0) {
    if (wasOnePointer && !didDrag) {
      const t = tileAtScreen(e.clientX, e.clientY);
      hovered = t;
      updateHoverLabel();
      draw();
    }
    panBase = null;
  } else if (pointers.size === 1) {
    const [p] = [...pointers.values()];
    panBase = { x: p.x, y: p.y, camX: camera.x, camY: camera.y };
  }
}

function pointerCancel(e) {
  pointers.delete(e.pointerId);
  if (pointers.size === 0) panBase = null;
}

function wheel(e) {
  e.preventDefault();
  const dir = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  const newZoom = clamp(camera.zoom * dir, 0.4, 3.0);
  const ratio = newZoom / camera.zoom;
  camera.x = e.clientX - (e.clientX - camera.x) * ratio;
  camera.y = e.clientY - (e.clientY - camera.y) * ratio;
  camera.zoom = newZoom;
  draw();
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

canvas.addEventListener('pointerdown', pointerDown);
canvas.addEventListener('pointermove', pointerMove);
canvas.addEventListener('pointerup', pointerUp);
canvas.addEventListener('pointercancel', pointerCancel);
canvas.addEventListener('wheel', wheel, { passive: false });

// ============================================================
// UI wiring
// ============================================================
const seedInput = document.getElementById('seedInput');
const rerollBtn = document.getElementById('rerollBtn');
const resetViewBtn = document.getElementById('resetViewBtn');
const hoverLabel = document.getElementById('hoverLabel');
const dimsLabel = document.getElementById('dimsLabel');

function setSeed(s) {
  const n = parseInt(s, 10);
  if (!Number.isFinite(n)) return;
  map = generateMap(n, BOARD_RADIUS);
  seedInput.value = String(n);
  hovered = null;
  updateHoverLabel();
  camera.reset();
  draw();
}

function reroll() {
  const n = Math.floor(Math.random() * 1e9);
  setSeed(n);
}

seedInput.addEventListener('change', () => setSeed(seedInput.value));
rerollBtn.addEventListener('click', reroll);
resetViewBtn.addEventListener('click', () => { camera.reset(); draw(); });

function updateHoverLabel() {
  if (hovered) {
    const v = hovered.hasVillage ? ' + village' : '';
    hoverLabel.textContent = `(${hovered.q},${hovered.r}) ${hovered.type.label}${v}`;
  } else hoverLabel.textContent = '—';
}

dimsLabel.textContent = `radius ${BOARD_RADIUS} (${map.tiles.length} tiles)`;

// ============================================================
// Boot
// ============================================================
window.addEventListener('resize', () => { resizeCanvas(); camera.recenter(); draw(); });
resizeCanvas();
setSeed(1);

</script>
</body>
</html>
