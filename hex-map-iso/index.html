<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>TBS Hex Map — Pass & Play 1v1</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: #111a2e;
      --line: #1f2a44;
      --text: #e6ecff;
      --muted: #8b9bbf;
      --p1: #dc2626;
      --p2: #3b82f6;
      --brown-light: #c8a878;
      --brown-dark: #6b3e1f;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overscroll-behavior: none; touch-action: none; }
    #canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; background: var(--bg); }

    /* Top turn banner */
    #topBar {
      position: fixed;
      top: env(safe-area-inset-top, 8px);
      left: env(safe-area-inset-left, 8px);
      right: env(safe-area-inset-right, 8px);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: none;
      padding: 4px;
    }
    .pill { pointer-events: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 999px; padding: 6px 10px; font-size: 12px; color: var(--text); }
    .pill.muted { color: var(--muted); }
    button.pill { cursor: pointer; user-select: none; }
    button.pill:active { transform: scale(0.97); }
    button.pill.primary { background: var(--p1); border-color: transparent; color: white; font-weight: 600; }
    button.pill.p2 { background: var(--p2); }
    #seedInput { background: var(--bg); color: var(--text); border: 1px solid var(--line); border-radius: 999px; padding: 4px 8px; width: 80px; font-size: 12px; }
    #turnPill { font-weight: 600; }
    #turnPill.p1 { color: var(--p1); }
    #turnPill.p2 { color: var(--p2); }

    /* Bottom hover label + legend */
    #bottomBar {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 8px) + 4px);
      left: env(safe-area-inset-left, 8px);
      right: env(safe-area-inset-right, 8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: none;
    }
    #hoverPill { background: var(--panel); border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px; font-size: 11px; color: var(--muted); pointer-events: auto; }
    #endTurnBtn {
      pointer-events: auto;
      background: var(--p1);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      letter-spacing: 0.5px;
    }
    #endTurnBtn.p2 { background: var(--p2); }
    #endTurnBtn:active { transform: scale(0.97); }

    /* Action picker (village, unit, or build-farm plains) */
    #actionPicker, #farmPicker {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(env(safe-area-inset-bottom, 8px) + 56px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      min-width: 240px;
      max-width: 340px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      z-index: 10;
      display: none;
    }
    .ap-title { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
    .ap-sub { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
    .ap-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .ap-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: var(--bg); color: var(--text); border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; font-size: 12px; cursor: pointer; }
    .ap-btn:hover:not(:disabled) { background: #1a2542; }
    .ap-btn:active:not(:disabled) { transform: scale(0.97); }
    .ap-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .ap-icon { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #0006; }
    .ap-cost { font-size: 10px; color: var(--muted); }
    .ap-close { width: 100%; background: transparent; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; padding: 5px 10px; font-size: 11px; cursor: pointer; }
    .ap-close:hover { color: var(--text); }

    /* Tech tree panel — centered modal, same visual language as actionPicker */
    #techPanel {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      min-width: 260px;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55);
      z-index: 40;
      display: none;
    }
    #techList { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .tech-row { display: flex; align-items: center; gap: 10px; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; }
    .tech-row .t-icon { width: 18px; height: 18px; border-radius: 4px; border: 1px solid #0006; flex: 0 0 auto; }
    .tech-row .t-meta { flex: 1 1 auto; min-width: 0; }
    .tech-row .t-name { font-size: 13px; font-weight: 600; }
    .tech-row .t-sub { font-size: 11px; color: var(--muted); }
    .tech-row button { background: var(--p2); color: white; border: none; border-radius: 8px; padding: 6px 10px; font-size: 11px; font-weight: 600; cursor: pointer; flex: 0 0 auto; }
    .tech-row button:disabled { background: #2a3550; color: var(--muted); cursor: not-allowed; }
    .tech-row.done { opacity: 0.7; }
    .tech-row.done .t-done { font-size: 11px; color: #4ade80; font-weight: 600; }

    /* Pass-the-device screen */
    #passOverlay {
      position: fixed;
      inset: 0;
      background: rgba(11, 18, 32, 0.97);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 50;
      padding: 24px;
      text-align: center;
    }
    #passOverlay h1 { font-size: 28px; margin: 0 0 8px; }
    #passOverlay p { color: var(--muted); margin: 0 0 24px; }
    #passOverlay button { background: var(--p1); color: white; border: none; border-radius: 12px; padding: 14px 28px; font-size: 16px; font-weight: 600; cursor: pointer; }
    #passOverlay button.p2 { background: var(--p2); }

    /* Win screen */
    #winOverlay {
      position: fixed;
      inset: 0;
      background: rgba(11, 18, 32, 0.97);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 60;
      padding: 24px;
      text-align: center;
    }
    #winOverlay h1 { font-size: 36px; margin: 0 0 12px; }
    #winOverlay p { color: var(--muted); margin: 0 0 24px; }
    #winOverlay button { background: var(--panel); color: white; border: 1px solid var(--line); border-radius: 12px; padding: 12px 24px; font-size: 14px; cursor: pointer; }

    /* Combat log toast */
    #combatToast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 5;
      max-width: 90%;
    }
    #combatToast.show { opacity: 1; }

    @media (max-width: 480px) {
      .pill { font-size: 11px; padding: 5px 8px; }
      #seedInput { width: 60px; }
      #passOverlay h1 { font-size: 22px; }
      #winOverlay h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="topBar">
    <div class="pill" id="turnPill">P1 · 5★ · Turn 1</div>
    <button class="pill" id="techBtn" title="Tech tree — research to unlock units">Tech</button>
    <label class="pill"><span class="muted">seed</span>&nbsp;<input id="seedInput" type="text" inputmode="numeric" pattern="[0-9]*" /></label>
    <button class="pill" id="newGameBtn">New</button>
    <button class="pill" id="aiToggleBtn" title="Toggle AI opponent (P2)">vs AI: off</button>
    <div class="pill muted" id="modePill" title="Network mode">offline</div>
  </div>

  <!--
    Tech tree v0 panel — three flat-cost (5★) instant researches that gate
    unit production. Riding → Rider, Archery → Archer, Strategy → Defender.
    Warrior is unlocked from the start. Matches server `Research` intent.
  -->
  <div id="techPanel">
    <div class="ap-title" id="techTitle">Tech Tree</div>
    <div class="ap-sub" id="techSub">5★ each · instant · unlocks a unit</div>
    <div id="techList"></div>
    <button class="ap-close" id="techCloseBtn">Close</button>
  </div>

  <div id="bottomBar">
    <span id="hoverPill">tap a hex</span>
    <button id="endTurnBtn">End Turn</button>
  </div>

  <div id="actionPicker">
    <div class="ap-title" id="apTitle">My Village</div>
    <div class="ap-sub" id="apSub">Empty — train a unit</div>
    <div class="ap-buttons">
      <button class="ap-btn" id="makeWarriorBtn">
        <div class="ap-icon" style="background:#3b82f6"></div>
        <span>Warrior</span>
        <span class="ap-cost">2★</span>
      </button>
      <button class="ap-btn" id="makeRiderBtn">
        <div class="ap-icon" style="background:#78350f"></div>
        <span>Rider</span>
        <span class="ap-cost">3★</span>
      </button>
      <button class="ap-btn" id="makeArcherBtn">
        <div class="ap-icon" style="background:#15803d"></div>
        <span>Archer</span>
        <span class="ap-cost">3★</span>
      </button>
      <button class="ap-btn" id="makeDefenderBtn">
        <div class="ap-icon" style="background:#6b7280"></div>
        <span>Defender</span>
        <span class="ap-cost">3★</span>
      </button>
    </div>
    <button class="ap-btn" id="buildWallBtn" style="width:100%;flex-direction:row;justify-content:center;margin-bottom:8px;">
      <div class="ap-icon" style="background:#9ca3af"></div>
      <span>Build Wall</span>
      <span class="ap-cost">5★</span>
    </button>
    <button class="ap-close" id="apCloseBtn">Close</button>
  </div>

  <div id="farmPicker">
    <div class="ap-title" id="fpTitle">Plains (your territory)</div>
    <div class="ap-sub" id="fpSub">Build a farm for +1★/turn</div>
    <button class="ap-btn" id="buildFarmBtn" style="width:100%;flex-direction:row;justify-content:center;margin-bottom:8px;">
      <div class="ap-icon" style="background:#facc15"></div>
      <span>Build Farm</span>
      <span class="ap-cost">5★</span>
    </button>
    <button class="ap-close" id="fpCloseBtn">Close</button>
  </div>

  <div id="passOverlay">
    <h1 id="passTitle">Pass to Player 2</h1>
    <p>Hand the device over. Tap the button below when ready.</p>
    <button id="passBtn">I'm Player 2 — start turn</button>
  </div>

  <div id="winOverlay">
    <h1 id="winTitle">Player 1 wins!</h1>
    <p id="winSub">Captured the opposing village.</p>
    <button id="winRestartBtn">Play again</button>
  </div>

  <div id="combatToast"></div>

<script>
'use strict';

// ============================================================
// PASS & PLAY 1v1 — turn-based hex combat
// ------------------------------------------------------------
// Two human players take turns on the same device.
// Per spec at /specs/pass-n-play-1v1.md, rules per doc 10 GDD.
// Pure-logic functions sit at the top; render + input below.
// ============================================================

// ---- Seeded RNG (mulberry32) ----
function mulberry32(seed) {
  let s = seed >>> 0;
  return function () {
    s |= 0; s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ---- Board params ----
const BOARD_RADIUS = 6;
const HEX_SIZE = 36;
const ISO_Y_SCALE = 0.68;
const TILE_DEPTH = 14;
const WATER_SINK = 7;
const VILLAGE_TARGET = 8;
const VILLAGE_MIN_DIST = 3;
const STARTING_STARS = 5;
const STARS_PER_VILLAGE = 2;
const WALL_COST = 5; // cost in stars to build a wall on an owned village
// Farm improvement (prototype v0; GDD silent). Built on plains in own
// territory. +1★/turn paid to whichever player currently controls the
// territory the farm sits in. Mirrors server FARM_COST/STARS_PER_FARM.
const FARM_COST = 5;
const STARS_PER_FARM = 1;

// ---- Tech tree v0 ----
// Three flat-cost (5★) instant researches that gate unit production.
// GDD §2.5 has a per-tier cost formula; deferred for prototype. Mirrors
// server/src/game/state.ts constants.
const TECH_COST = 5;
const TECH_IDS = ['riding', 'archery', 'strategy'];
const TECH_META = {
  riding:   { label: 'Riding',   unlocksLabel: 'Rider',    unitType: 'rider',    color: '#78350f' },
  archery:  { label: 'Archery',  unlocksLabel: 'Archer',   unitType: 'archer',   color: '#15803d' },
  strategy: { label: 'Strategy', unlocksLabel: 'Defender', unitType: 'defender', color: '#6b7280' },
};
// unitType → required tech (null = always unlocked).
const UNIT_TECH_REQUIREMENT = {
  warrior: null,
  rider: 'riding',
  archer: 'archery',
  defender: 'strategy',
};

// ---- SFX ----
// Lazy-load on first user interaction (iOS / Safari refuses to play audio
// until a touch event). Each clip is a single shared <audio> element played
// at moderate volume. Failure to load is silent — gameplay isn't gated on
// audio working.
const SFX = {};
const SFX_FILES = {
  click:   'sfx/tbs-ui-click.mp3',
  train:   'sfx/tbs-train.mp3',
  endTurn: 'sfx/tbs-end-turn.mp3',
  combat:  'sfx/tbs-combat-hit.mp3',
  capture: 'sfx/tbs-capture.mp3',
  build:   'sfx/tbs-build.mp3',
};
let sfxUnlocked = false;
function preloadSfx() {
  for (const [key, src] of Object.entries(SFX_FILES)) {
    if (SFX[key]) continue;
    const a = new Audio(src);
    a.preload = 'auto';
    a.volume = 0.45;
    SFX[key] = a;
  }
}
function unlockSfxOnce() {
  if (sfxUnlocked) return;
  sfxUnlocked = true;
  preloadSfx();
  // Touch each one to satisfy iOS's "must be triggered from a user gesture" rule
  for (const a of Object.values(SFX)) {
    a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
  }
}
function playSfx(key) {
  const src = SFX[key];
  if (!src) return;
  // Clone so overlapping triggers don't cut each other off
  const a = src.cloneNode();
  a.volume = src.volume;
  a.play().catch(() => {});
}

const TILE = {
  WATER:    { id: 'water',    top: '#2563eb', side: '#1e3a8a', label: 'water',    passable: false, defenseBonus: 1.0 },
  PLAINS:   { id: 'plains',   top: '#86efac', side: '#4d7c4f', label: 'plains',   passable: true,  defenseBonus: 1.0 },
  TREES:    { id: 'trees',    top: '#15803d', side: '#14532d', label: 'trees',    passable: true,  defenseBonus: 1.5 },
  MOUNTAIN: { id: 'mountain', top: '#a8a29e', side: '#57534e', label: 'mountain', passable: true,  defenseBonus: 1.5 },
};

const UNIT_STATS = {
  warrior:  { hp: 10, atk: 2, def: 2, move: 1, range: 1, cost: 2, dash: false, label: 'Warrior'  },
  rider:    { hp: 10, atk: 2, def: 1, move: 2, range: 1, cost: 3, dash: true,  label: 'Rider'    },
  archer:   { hp: 10, atk: 2, def: 1, move: 1, range: 2, cost: 3, dash: false, label: 'Archer'   },
  defender: { hp: 15, atk: 1, def: 3, move: 1, range: 1, cost: 3, dash: false, label: 'Defender' },
};

const PLAYER_COLORS = {
  0: { body: '#dc2626', dark: '#991b1b', label: 'Player 1', short: 'P1' }, // RED
  1: { body: '#3b82f6', dark: '#1d4ed8', label: 'Player 2', short: 'P2' }, // BLUE
};

// ---- Hex math ----
const SQRT3 = Math.sqrt(3);
const HEX_NEIGHBOR_OFFSETS = [
  { q:  1, r:  0 }, { q:  1, r: -1 }, { q:  0, r: -1 },
  { q: -1, r:  0 }, { q: -1, r:  1 }, { q:  0, r:  1 },
];

function neighborsOf(q, r) { return HEX_NEIGHBOR_OFFSETS.map(n => ({ q: q + n.q, r: r + n.r })); }
function hexDistance(q1, r1, q2, r2) {
  const s1 = -q1 - r1, s2 = -q2 - r2;
  return Math.max(Math.abs(q1 - q2), Math.abs(r1 - r2), Math.abs(s1 - s2));
}
function axialToWorld(q, r) {
  return { x: HEX_SIZE * 1.5 * q, y: HEX_SIZE * SQRT3 * (r + q / 2) };
}
const HEX_CORNER_OFFSETS = (() => {
  const offsets = [];
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 180) * (60 * i);
    offsets.push({ x: HEX_SIZE * Math.cos(a), y: HEX_SIZE * Math.sin(a) });
  }
  return offsets;
})();

// ============================================================
// PURE LOGIC — combat, movement, reachability
// ============================================================

// GDD combat formula (verbatim).
function resolveCombat(attacker, defender, defenseBonus) {
  const aMax = UNIT_STATS[attacker.type].hp;
  const dMax = UNIT_STATS[defender.type].hp;
  const attackForce = UNIT_STATS[attacker.type].atk * (attacker.hp / aMax);
  const defenseForce = UNIT_STATS[defender.type].def * (defender.hp / dMax) * defenseBonus;
  const totalDamage = attackForce + defenseForce;
  if (totalDamage === 0) return { attackerDamage: 0, defenderDamage: 0 };
  const defenderDamage = Math.round((attackForce  / totalDamage) * UNIT_STATS[attacker.type].atk * 4.5);
  const attackerDamage = Math.round((defenseForce / totalDamage) * UNIT_STATS[defender.type].def * 4.5);
  return { attackerDamage, defenderDamage };
}

// BFS over passable tiles for "reachable" within move points.
// Cannot pass through tiles occupied by any unit (own or enemy).
// Cannot end on a tile occupied by any unit.
function reachableTiles(state, unit) {
  const startKey = `${unit.q},${unit.r}`;
  const visited = new Map(); // key → cost
  visited.set(startKey, 0);
  const queue = [{ q: unit.q, r: unit.r, cost: 0 }];
  const move = UNIT_STATS[unit.type].move;
  while (queue.length) {
    const { q, r, cost } = queue.shift();
    if (cost >= move) continue;
    for (const { q: nq, r: nr } of neighborsOf(q, r)) {
      const k = `${nq},${nr}`;
      if (visited.has(k)) continue;
      const tile = state.tileAt(nq, nr);
      if (!tile) continue;
      if (!tile.type.passable) continue;
      // Can't step onto any unit
      if (state.unitAt(nq, nr)) continue;
      visited.set(k, cost + 1);
      queue.push({ q: nq, r: nr, cost: cost + 1 });
    }
  }
  visited.delete(startKey);
  const out = [];
  for (const k of visited.keys()) {
    const [q, r] = k.split(',').map(Number);
    out.push({ q, r });
  }
  return out;
}

// Tiles within attack range containing an enemy unit.
// Enemy units out of vision are not attackable (you can't see them).
function attackableTiles(state, unit) {
  const visible = visibilityForPlayer(state, unit.player);
  const out = [];
  const range = UNIT_STATS[unit.type].range;
  for (const u of state.units) {
    if (u.player === unit.player) continue;
    if (!isVisible(visible, u.q, u.r)) continue;
    const d = hexDistance(unit.q, unit.r, u.q, u.r);
    if (d <= range && d > 0) out.push({ q: u.q, r: u.r });
  }
  return out;
}

function tileDefenseBonus(tile) {
  // GDD §2.7: 4.0 walled city, 1.5 unwalled city / forest / mountain, 1.0 plains.
  if (tile.hasVillage && tile.hasWall) return 4.0;
  if (tile.hasVillage) return 1.5;
  return tile.type.defenseBonus;
}

// GDD §2.6 healing helper: "own territory" = own village OR a tile within
// hex-distance 1 of an owned village (the 1-tile ring).
function isOwnTerritory(state, q, r, playerId) {
  for (const t of state.map.tiles) {
    if (!t.hasVillage) continue;
    if (t.ownerPlayer !== playerId) continue;
    if (hexDistance(t.q, t.r, q, r) <= 1) return true;
  }
  return false;
}

// SC2-style fog of war (per doc 10 §2.1.1):
//   Terrain & village positions = always public.
//   Enemy units = visible only when within vision radius of an own unit or
//                 own village. Vision radius = 1 hex (own tile + neighbors).
//                 Mountains grant radius 2 — but units don't sit on mountains
//                 in this prototype, so radius 1 across the board.
//   "Last seen" memory of enemy units is deferred to v0.2.
function visibilityForPlayer(state, playerId) {
  const visible = new Set();
  const add = (q, r) => visible.add(`${q},${r}`);
  // Own villages — capital gets radius 2, all others radius 1.
  for (const t of state.map.tiles) {
    if (t.hasVillage && t.ownerPlayer === playerId) {
      const r = t.isCapital ? 2 : 1;
      for (const tt of state.map.tiles) {
        if (hexDistance(t.q, t.r, tt.q, tt.r) <= r) add(tt.q, tt.r);
      }
    }
  }
  // Own units — radius 1, or 2 if standing on a mountain (per GDD §2.6).
  for (const u of state.units) {
    if (u.player === playerId) {
      const r = state.tileAt(u.q, u.r).type === TILE.MOUNTAIN ? 2 : 1;
      for (const t of state.map.tiles) {
        if (hexDistance(u.q, u.r, t.q, t.r) <= r) add(t.q, t.r);
      }
    }
  }
  return visible;
}

function isVisible(visibleSet, q, r) {
  return visibleSet.has(`${q},${r}`);
}

// ============================================================
// MAP GENERATION
// ============================================================

function hexAxialsForRadius(radius) {
  const tiles = [];
  for (let q = -radius; q <= radius; q++) {
    for (let r = -radius; r <= radius; r++) {
      const s = -q - r;
      if (Math.max(Math.abs(q), Math.abs(r), Math.abs(s)) <= radius) tiles.push({ q, r });
    }
  }
  return tiles;
}

function generateMap(seed, radius) {
  const rng = mulberry32(seed);
  const cells = hexAxialsForRadius(radius);

  function pickAxialPoints(n) {
    const pts = [];
    for (let i = 0; i < n; i++) pts.push({ q: (rng() * 2 - 1) * radius, r: (rng() * 2 - 1) * radius });
    return pts;
  }

  const waterCenters = pickAxialPoints(3);
  const treeCenters  = pickAxialPoints(5);
  const mountainCenters = pickAxialPoints(3);

  function minAxialDistance(q, r, points) {
    let best = Infinity;
    for (const p of points) {
      const d = Math.max(Math.abs(q - p.q), Math.abs(r - p.r), Math.abs((q + r) - (p.q + p.r)));
      if (d < best) best = d;
    }
    return best;
  }

  const tiles = cells.map(({ q, r }) => {
    const waterScore = minAxialDistance(q, r, waterCenters) + 0.5 * rng();
    const treeScore  = minAxialDistance(q, r, treeCenters)  + 0.6 * rng();
    const mountScore = minAxialDistance(q, r, mountainCenters) + 0.4 * rng();
    let type = TILE.PLAINS;
    if (waterScore < 1.6) type = TILE.WATER;
    else if (mountScore < 1.5) type = TILE.MOUNTAIN;
    else if (treeScore < 1.8) type = TILE.TREES;
    const s = -q - r;
    const ringDist = radius - Math.max(Math.abs(q), Math.abs(r), Math.abs(s));
    if (ringDist === 0 && rng() < 0.55) type = TILE.WATER;
    else if (ringDist === 1 && rng() < 0.22) type = TILE.WATER;
    return { q, r, type, hasVillage: false, ownerPlayer: null, isCapital: false, hasWall: false, hasFarm: false };
  });

  // Villages on plains
  const candidates = tiles.filter(t => t.type === TILE.PLAINS).slice();
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  const villages = [];
  for (const c of candidates) {
    if (villages.length >= VILLAGE_TARGET) break;
    const ok = villages.every(v => hexDistance(v.q, v.r, c.q, c.r) >= VILLAGE_MIN_DIST);
    if (ok) { villages.push(c); c.hasVillage = true; }
  }

  // Pick the two most-distant villages as P1 and P2 capitals.
  // Capital constraint: at least 2 tiles in from the board edge so neither
  // player spawns on the border. If no candidate qualifies (very small map
  // or pathological gen), fall back to the unfiltered village list.
  const capitalPool = villages.filter(v => {
    const s = -v.q - v.r;
    return Math.max(Math.abs(v.q), Math.abs(v.r), Math.abs(s)) <= radius - 2;
  });
  const pool = capitalPool.length >= 2 ? capitalPool : villages;
  let p1V = null, p2V = null, best = -1;
  for (let i = 0; i < pool.length; i++) {
    for (let j = i + 1; j < pool.length; j++) {
      const d = hexDistance(pool[i].q, pool[i].r, pool[j].q, pool[j].r);
      if (d > best) { best = d; p1V = pool[i]; p2V = pool[j]; }
    }
  }
  // In "vs AI" mode, give the human (P1) the more-central spawn so the
  // bot doesn't immediately end up in a positional advantage that
  // compensates for its dumb heuristic. Centrality = lower max(|q|,|r|,|s|).
  if (AI.enabled && p1V && p2V) {
    const cent = v => Math.max(Math.abs(v.q), Math.abs(v.r), Math.abs(-v.q - v.r));
    if (cent(p2V) < cent(p1V)) { const t = p1V; p1V = p2V; p2V = t; }
  }
  // Capitals start walled (GDD §2.3 City Wall, ×4 def). Other villages unwalled.
  if (p1V) { p1V.ownerPlayer = 0; p1V.isCapital = true; p1V.hasWall = true; }
  if (p2V) { p2V.ownerPlayer = 1; p2V.isCapital = true; p2V.hasWall = true; }

  return { radius, tiles, seed };
}

// ============================================================
// GAME STATE
// ============================================================

function newGame(seed) {
  const map = generateMap(seed, BOARD_RADIUS);
  const state = {
    map,
    units: [],
    players: [
      { id: 0, stars: STARTING_STARS, researchedTechs: [] },
      { id: 1, stars: STARTING_STARS, researchedTechs: [] },
    ],
    currentPlayer: 0,
    turn: 1,
    nextUnitSeq: 0,
    phase: 'play', // 'play' | 'pass' | 'won'
    winner: null,
    selected: null, // { kind: 'unit'|'village', q, r }
    tileAt(q, r) { return this.map.tiles.find(t => t.q === q && t.r === r); },
    unitAt(q, r) { return this.units.find(u => u.q === q && u.r === r); },
    villageAt(q, r) { const t = this.tileAt(q, r); return t && t.hasVillage ? t : null; },
    ownedVillages(playerId) { return this.map.tiles.filter(t => t.hasVillage && t.ownerPlayer === playerId); },
    // Farms "owned" by a player = farms currently sitting in that player's
    // territory (within 1 hex of an owned village). Recomputed each call —
    // farm tiles store no explicit ownership, so capture-and-flip Just Works.
    ownedFarms(playerId) { return this.map.tiles.filter(t => t.hasFarm && isOwnTerritory(this, t.q, t.r, playerId)); },
  };
  return state;
}

function buildWallLocal(state, village) {
  if (village.ownerPlayer !== state.currentPlayer) return false;
  if (village.hasWall) return false;
  const player = state.players[state.currentPlayer];
  if (player.stars < WALL_COST) return false;
  player.stars -= WALL_COST;
  village.hasWall = true;
  return true;
}

// BuildFarm: tile must be plains, not already farmed or a village, and must
// sit in current player's territory (within 1 hex of an owned village).
// Mirrors server rules.ts buildFarm exactly. Returns true on success.
function buildFarmLocal(state, tile) {
  if (!tile) return false;
  if (tile.type !== TILE.PLAINS) return false;
  if (tile.hasFarm || tile.hasVillage) return false;
  if (!isOwnTerritory(state, tile.q, tile.r, state.currentPlayer)) return false;
  const player = state.players[state.currentPlayer];
  if (player.stars < FARM_COST) return false;
  player.stars -= FARM_COST;
  tile.hasFarm = true;
  return true;
}

function researchTech(state, tech) {
  if (!TECH_IDS.includes(tech)) return false;
  const player = state.players[state.currentPlayer];
  if (player.researchedTechs.includes(tech)) return false;
  if (player.stars < TECH_COST) return false;
  player.stars -= TECH_COST;
  player.researchedTechs.push(tech);
  return true;
}

function trainUnit(state, village, type) {
  const stats = UNIT_STATS[type];
  const player = state.players[state.currentPlayer];
  if (village.ownerPlayer !== state.currentPlayer) return false;
  if (state.unitAt(village.q, village.r)) return false;
  // Tech gate (mirrors server rules.ts trainUnit). Warrior is always allowed.
  const required = UNIT_TECH_REQUIREMENT[type];
  if (required && !player.researchedTechs.includes(required)) return false;
  if (player.stars < stats.cost) return false;
  player.stars -= stats.cost;
  // Deterministic unit ID: turn-player-sequence. No Math.random in rules code
  // per doc 18 §4 / §8 — IDs must replay identically across clients & server.
  const id = `u-${state.turn}-${state.currentPlayer}-${state.nextUnitSeq++}`;
  state.units.push({
    id,
    q: village.q,
    r: village.r,
    type,
    player: state.currentPlayer,
    hp: stats.hp,
    canMove: false,
    canAttack: false, // summoning sickness — no actions on creation turn
    hasMovedThisTurn: false,
  });
  return true;
}

function moveUnit(state, unit, toQ, toR) {
  if (unit.player !== state.currentPlayer) return false;
  if (!unit.canMove) return false;
  const tile = state.tileAt(toQ, toR);
  if (!tile || !tile.type.passable) return false;
  if (state.unitAt(toQ, toR)) return false;
  const dist = hexDistance(unit.q, unit.r, toQ, toR);
  if (dist > UNIT_STATS[unit.type].move) return false;
  // Verify the dest is in BFS-reachable set
  const reach = reachableTiles(state, unit);
  if (!reach.some(t => t.q === toQ && t.r === toR)) return false;
  unit.q = toQ;
  unit.r = toR;
  unit.canMove = false;
  unit.hasMovedThisTurn = true;
  // Warriors: moving consumes the action (no attack this turn).
  // Riders: Dash — can still attack after moving.
  if (!UNIT_STATS[unit.type].dash) unit.canAttack = false;
  return true;
}

function attackUnit(state, attacker, defender) {
  if (attacker.player !== state.currentPlayer) return null;
  if (!attacker.canAttack) return null;
  // Vision check (GDD §2.6): ranged units must verify target visibility
  // before firing. Matches server attack() in rules.ts.
  const vis = visibilityForPlayer(state, attacker.player);
  if (!isVisible(vis, defender.q, defender.r)) return null;
  const dist = hexDistance(attacker.q, attacker.r, defender.q, defender.r);
  if (dist > UNIT_STATS[attacker.type].range) return null;
  const defTile = state.tileAt(defender.q, defender.r);
  const bonus = tileDefenseBonus(defTile);
  const { attackerDamage, defenderDamage } = resolveCombat(attacker, defender, bonus);
  defender.hp -= defenderDamage;
  // Retaliation: defender must survive AND be able to reach attacker within
  // its own range. Polytopia-faithful — melee can't reply to a ranged attack.
  const defenderCanReach = dist <= UNIT_STATS[defender.type].range;
  const retaliates = defender.hp > 0 && defenderCanReach;
  if (retaliates) attacker.hp -= attackerDamage;
  attacker.canAttack = false;
  attacker.canMove = false;
  const events = [{
    attackerType: attacker.type,
    defenderType: defender.type,
    defenderDamage,
    attackerDamage: retaliates ? attackerDamage : 0,
    defenderKilled: defender.hp <= 0,
    attackerKilled: retaliates && attacker.hp <= 0,
  }];
  state.units = state.units.filter(u => u.hp > 0);
  return events;
}

function startTurn(state) {
  // Star income — villages (+2★) + farms (+1★).
  // Farm income goes to whichever player's territory the farm sits in NOW,
  // recomputed each call (see ownedFarms in state). Mirrors server rules.ts.
  const owned = state.ownedVillages(state.currentPlayer).length;
  const farms = state.ownedFarms(state.currentPlayer).length;
  state.players[state.currentPlayer].stars += STARS_PER_VILLAGE * owned + STARS_PER_FARM * farms;
  // Wake up all of this player's units (units trained THIS turn get summoning sickness off next turn)
  for (const u of state.units) {
    if (u.player === state.currentPlayer) {
      u.canMove = true;
      u.canAttack = true;
      u.hasMovedThisTurn = false;
    }
  }
}

function endTurn(state) {
  // Capture: any active-player unit standing on a non-self village captures it.
  // Restricted to the active player's units only (matches server).
  // Neutral capture (prev owner null) pays a +5★ lump sum per GDD §2.2.
  for (const u of state.units) {
    if (u.player !== state.currentPlayer) continue;
    const v = state.villageAt(u.q, u.r);
    if (!v) continue;
    if (v.ownerPlayer === state.currentPlayer) continue;
    const prev = v.ownerPlayer;
    v.ownerPlayer = state.currentPlayer;
    if (prev === null) {
      state.players[state.currentPlayer].stars += 5;
    }
  }
  // Healing per GDD §2.6: each active-player unit that did NOT move AND
  // did NOT attack heals +4 HP on own-territory tiles (own village or its
  // 1-tile ring), +2 elsewhere. Cap at maxHp.
  // Predicate "didn't move/attack" = !hasMovedThisTurn && canAttack.
  for (const u of state.units) {
    if (u.player !== state.currentPlayer) continue;
    if (u.hasMovedThisTurn || !u.canAttack) continue;
    const maxHp = UNIT_STATS[u.type].hp;
    if (u.hp >= maxHp) continue;
    const heal = isOwnTerritory(state, u.q, u.r, u.player) ? 4 : 2;
    u.hp = Math.min(maxHp, u.hp + heal);
  }
  // Check win: own at least one village and opponent owns none.
  for (let p = 0; p < 2; p++) {
    const opp = 1 - p;
    const oppOwns = state.map.tiles.some(t => t.hasVillage && t.ownerPlayer === opp);
    const oppUnits = state.units.some(u => u.player === opp);
    if (!oppOwns && !oppUnits) {
      state.phase = 'won';
      state.winner = p;
      return;
    }
  }
  // Advance
  state.currentPlayer = 1 - state.currentPlayer;
  if (state.currentPlayer === 0) state.turn += 1;
  state.phase = 'pass';
  state.selected = null;
}

// ============================================================
// AI OPPONENT (offline only) — greedy heuristic
// ------------------------------------------------------------
// Client-side stub bot that controls P2 when ?ai=1 (or the "vs AI"
// toggle is on). Uses the same local helpers humans use (trainUnit,
// moveUnit, attackUnit, endTurn) so the prototype rules stay the
// single source of truth. NOT wired into the server — server still
// stays human-input-only.
//
// Per-turn algorithm (deterministic, no Math.random):
//   1. For each owned empty village: train cheapest affordable unit.
//   2. For each owned unit (sorted by id):
//        a. If any enemy in attack range, attack lowest-HP enemy
//           (ties broken by closest hex distance to AI's capital).
//        b. Else if it can move, step one hex closer to the nearest
//           enemy capital using BFS-shortest-path.
//   3. End turn (caller handles SFX + pass overlay skip).
// ============================================================

const AI = {
  enabled: false,
  player: 1,           // AI is always P2 in this prototype
  acting: false,       // re-entrancy guard while a turn is in progress
  actionDelayMs: 400,  // pause between AI actions so the human sees them
};

function readAiConfigFromUrl() {
  try {
    const params = new URLSearchParams(window.location.search);
    const ai = params.get('ai');
    return ai === '1' || ai === 'true';
  } catch {
    return false;
  }
}

function writeAiFlagToUrl(on) {
  try {
    const u = new URL(window.location.href);
    if (on) u.searchParams.set('ai', '1');
    else u.searchParams.delete('ai');
    window.history.replaceState({}, '', u.toString());
  } catch { /* noop */ }
}

// Sleep helper for AI pacing. Resolves after ms (or immediately if ms<=0).
function aiSleep(ms) {
  if (ms <= 0) return Promise.resolve();
  return new Promise(res => setTimeout(res, ms));
}

// BFS shortest path length from (sq,sr) to (gq,gr), counting tiles
// (start excluded, goal included). Returns Infinity if unreachable.
// Treats own units as walls; the goal hex itself is allowed even if
// occupied (so we can measure distance to enemy capital with enemy on it).
// Used only for movement target selection.
function aiBfsDistance(state, sq, sr, gq, gr) {
  if (sq === gq && sr === gr) return 0;
  const visited = new Set([`${sq},${sr}`]);
  const queue = [{ q: sq, r: sr, d: 0 }];
  while (queue.length) {
    const { q, r, d } = queue.shift();
    for (const { q: nq, r: nr } of neighborsOf(q, r)) {
      const k = `${nq},${nr}`;
      if (visited.has(k)) continue;
      const tile = state.tileAt(nq, nr);
      if (!tile) continue;
      if (nq === gq && nr === gr) return d + 1;
      if (!tile.type.passable) continue;
      // Treat occupied hexes as blocked for pathing.
      if (state.unitAt(nq, nr)) continue;
      visited.add(k);
      queue.push({ q: nq, r: nr, d: d + 1 });
    }
  }
  return Infinity;
}

// Find the enemy capital(s) for the AI player. Falls back to any
// enemy-owned village if no capital remains (edge case after capture).
function aiEnemyCapitals(state, playerId) {
  const oppId = 1 - playerId;
  const capitals = state.map.tiles.filter(t => t.hasVillage && t.ownerPlayer === oppId && t.isCapital);
  if (capitals.length) return capitals;
  return state.map.tiles.filter(t => t.hasVillage && t.ownerPlayer === oppId);
}

// Find own capital for tie-break ordering. Falls back to any owned village.
function aiOwnCapital(state, playerId) {
  const cap = state.map.tiles.find(t => t.hasVillage && t.ownerPlayer === playerId && t.isCapital);
  if (cap) return cap;
  return state.map.tiles.find(t => t.hasVillage && t.ownerPlayer === playerId) || null;
}

// Step 1 of the AI turn: train cheapest affordable unit in each empty
// owned village. Returns a list of {village, unitType} actions for the
// caller to execute with pacing.
function aiPlanTraining(state, playerId) {
  // Sorted by axial (q,r) so ordering is stable across runs.
  const villages = state.map.tiles
    .filter(t => t.hasVillage && t.ownerPlayer === playerId)
    .filter(t => !state.unitAt(t.q, t.r))
    .sort((a, b) => (a.q - b.q) || (a.r - b.r));
  const actions = [];
  // Tech gate: AI considers only unit types whose required tech is researched.
  // v0 heuristic is "build cheapest" — with no research the AI sticks to Warriors,
  // which is fine for now (research strategy is deferred). Documented in spec.
  const player = state.players[playerId];
  const unlocked = Object.keys(UNIT_STATS).filter(t => {
    const req = UNIT_TECH_REQUIREMENT[t];
    return !req || player.researchedTechs.includes(req);
  });
  const unitTypesByCost = unlocked.sort((a, b) => UNIT_STATS[a].cost - UNIT_STATS[b].cost);
  let stars = player.stars;
  for (const v of villages) {
    // Pick the cheapest affordable — Warrior at 2★ in practice.
    const pick = unitTypesByCost.find(t => UNIT_STATS[t].cost <= stars);
    if (!pick) break;
    actions.push({ kind: 'train', village: v, unitType: pick });
    stars -= UNIT_STATS[pick].cost;
  }
  return actions;
}

// Step 2 plan-and-execute is interleaved (each action mutates state),
// so we run it directly rather than returning a static plan.
//
// Run the full AI turn for the active player. Mutates state via the
// existing local helpers. Yields control between actions so the UI
// can animate / play SFX. Caller is responsible for calling endTurn
// + showing the pass overlay afterward.
async function aiPlayTurn(state, onAction) {
  if (state.currentPlayer !== AI.player) return;
  const playerId = AI.player;

  // ---- 1. Training ----
  const trainActions = aiPlanTraining(state, playerId);
  for (const a of trainActions) {
    if (trainUnit(state, a.village, a.unitType)) {
      playSfx('train');
      if (onAction) onAction({ kind: 'train', unitType: a.unitType });
      await aiSleep(AI.actionDelayMs);
    }
  }

  // ---- 2. Unit actions ----
  // Stable order by unit id. Snapshot ids — units may die mid-turn.
  const ownedUnitIds = state.units
    .filter(u => u.player === playerId)
    .map(u => u.id)
    .sort();

  const ownCap = aiOwnCapital(state, playerId);
  const enemyCaps = aiEnemyCapitals(state, playerId);

  for (const uid of ownedUnitIds) {
    const unit = state.units.find(u => u.id === uid);
    if (!unit) continue; // killed earlier this turn (shouldn't happen but defensive)

    // 2a. Attack if any enemy in range.
    if (unit.canAttack) {
      const targets = attackableTiles(state, unit)
        .map(t => state.unitAt(t.q, t.r))
        .filter(Boolean);
      if (targets.length) {
        targets.sort((a, b) => {
          if (a.hp !== b.hp) return a.hp - b.hp;
          if (ownCap) {
            const da = hexDistance(a.q, a.r, ownCap.q, ownCap.r);
            const db = hexDistance(b.q, b.r, ownCap.q, ownCap.r);
            if (da !== db) return da - db;
          }
          return a.id < b.id ? -1 : a.id > b.id ? 1 : 0;
        });
        const target = targets[0];
        const events = attackUnit(state, unit, target);
        if (events && events.length) {
          playSfx('combat');
          if (onAction) onAction({ kind: 'attack', events });
          await aiSleep(AI.actionDelayMs);
        }
        continue; // attack consumes the unit's actions
      }
    }

    // 2b. Move toward closest enemy capital.
    if (unit.canMove && enemyCaps.length) {
      const reach = reachableTiles(state, unit);
      if (reach.length) {
        // Score each reachable tile by min BFS distance to any enemy capital.
        // Tie-break: hex distance to enemy capital (a "as-the-crow-flies" fallback),
        // then by (q,r) for determinism.
        let bestTile = null;
        let bestPath = Infinity;
        let bestHex = Infinity;
        for (const t of reach) {
          let pathBest = Infinity;
          let hexBest = Infinity;
          for (const cap of enemyCaps) {
            const p = aiBfsDistance(state, t.q, t.r, cap.q, cap.r);
            if (p < pathBest) pathBest = p;
            const h = hexDistance(t.q, t.r, cap.q, cap.r);
            if (h < hexBest) hexBest = h;
          }
          if (pathBest < bestPath ||
              (pathBest === bestPath && hexBest < bestHex) ||
              (pathBest === bestPath && hexBest === bestHex && bestTile &&
                ((t.q - bestTile.q) || (t.r - bestTile.r)) < 0)) {
            bestTile = t;
            bestPath = pathBest;
            bestHex = hexBest;
          }
        }
        // Also include current position as a baseline — only move if it
        // strictly decreases hex distance to closest enemy capital.
        let curHex = Infinity;
        for (const cap of enemyCaps) {
          const h = hexDistance(unit.q, unit.r, cap.q, cap.r);
          if (h < curHex) curHex = h;
        }
        if (bestTile && bestHex < curHex) {
          if (moveUnit(state, unit, bestTile.q, bestTile.r)) {
            if (onAction) onAction({ kind: 'move' });
            await aiSleep(AI.actionDelayMs);
            // Riders may dash → can still attack after moving. Check again.
            if (unit.canAttack) {
              const targets2 = attackableTiles(state, unit)
                .map(t => state.unitAt(t.q, t.r))
                .filter(Boolean);
              if (targets2.length) {
                targets2.sort((a, b) => (a.hp - b.hp) || (a.id < b.id ? -1 : 1));
                const events = attackUnit(state, unit, targets2[0]);
                if (events && events.length) {
                  playSfx('combat');
                  if (onAction) onAction({ kind: 'attack', events });
                  await aiSleep(AI.actionDelayMs);
                }
              }
            }
          }
        }
      }
    }
  }
}

// ============================================================
// NETWORK ADAPTER (online mode)
// ------------------------------------------------------------
// Offline mode (default) is the existing behavior — pure-local state,
// mutators run synchronously, pass-and-play UX.
//
// Online mode activates when:
//   - URL has ?server=<base-url>  (e.g. ?server=https://tbs-server.fly.dev)
//   - The "online" toggle is flipped on (writes ?server to URL + reloads)
//
// Wire protocol per server/src/api/server.ts:
//   POST /games                   → { gameId, seed, rulesVersion }
//   GET  /games/:id/state?player=N → { view, hash, currentPlayer, turn, phase, winner }
//   POST /games/:id/intents       → { events, hash, currentPlayer, turn, phase, winner }
//
// Server is authoritative. The client posts an intent, waits for the
// response, then re-fetches the fog-filtered state and re-renders.
// No optimistic application — server is the source of truth.
//
// Local player is fixed to player 0 in this prototype (single-tab demo).
// Pass-and-play does NOT apply in online mode (each device is one player).
// ============================================================

const NET = {
  enabled: false,
  baseUrl: null,
  gameId: null,
  myPlayer: 0,
  // Track last server header so the UI can detect "not my turn"
  serverTurn: 1,
  serverCurrentPlayer: 0,
  serverPhase: 'play',
  serverWinner: null,
  inFlight: false,
};

function readNetConfigFromUrl() {
  try {
    const params = new URLSearchParams(window.location.search);
    const server = params.get('server');
    if (!server) return { enabled: false };
    // Strip trailing slash
    const base = server.replace(/\/+$/, '');
    const gameId = params.get('game') || null;
    const player = parseInt(params.get('player') || '0', 10);
    return {
      enabled: true,
      baseUrl: base,
      gameId,
      myPlayer: Number.isInteger(player) && (player === 0 || player === 1) ? player : 0,
    };
  } catch {
    return { enabled: false };
  }
}

async function fetchJson(url, opts) {
  const res = await fetch(url, opts);
  const text = await res.text();
  let body = null;
  try { body = text ? JSON.parse(text) : null; } catch { body = { raw: text }; }
  if (!res.ok) {
    const reason = body && body.reason ? body.reason : (body && body.error ? body.error : `HTTP ${res.status}`);
    const err = new Error(`Request failed: ${reason}`);
    err.status = res.status;
    err.body = body;
    throw err;
  }
  return body;
}

async function netCreateGame(seed) {
  const url = `${NET.baseUrl}/games`;
  const body = JSON.stringify(seed !== undefined ? { seed } : {});
  return fetchJson(url, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body,
  });
}

async function netFetchState() {
  const url = `${NET.baseUrl}/games/${NET.gameId}/state?player=${NET.myPlayer}`;
  return fetchJson(url, { method: 'GET' });
}

async function netSubmitIntent(intent) {
  const url = `${NET.baseUrl}/games/${NET.gameId}/intents`;
  return fetchJson(url, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(intent),
  });
}

// Server tile.type is a string ('water'|'plains'|'trees'|'mountain').
// Prototype renderer expects tile.type to be one of TILE.* objects (with
// .passable and .defenseBonus). Normalize one side to the other so the
// renderer is mode-agnostic.
const SERVER_TILE_TYPE_TO_OBJ = {
  water: TILE.WATER,
  plains: TILE.PLAINS,
  trees: TILE.TREES,
  mountain: TILE.MOUNTAIN,
};

// Convert a server "view" payload into the prototype's in-memory game shape.
// The view already has fog applied — we don't filter further here.
function adoptServerView(view, header) {
  const tiles = view.map.tiles.map(t => {
    const typeObj = SERVER_TILE_TYPE_TO_OBJ[t.type];
    if (!typeObj) throw new Error(`Unknown server tile type: ${t.type}`);
    return {
      q: t.q,
      r: t.r,
      type: typeObj,
      hasVillage: !!t.hasVillage,
      ownerPlayer: t.ownerPlayer,
      isCapital: !!t.isCapital,
      hasWall: !!t.hasWall,
      hasFarm: !!t.hasFarm,
    };
  });
  const state = {
    map: { radius: view.map.radius, tiles, seed: view.map.seed },
    units: view.units.map(u => ({ ...u })),
    players: view.players.map(p => ({ ...p })),
    currentPlayer: view.currentPlayer,
    turn: view.turn,
    nextUnitSeq: view.nextUnitSeq,
    // Server only knows 'play' | 'won'. The 'pass' overlay is a pass-and-play
    // device-handoff thing that doesn't exist online (each device is one player).
    phase: header.phase === 'won' ? 'won' : 'play',
    winner: header.winner,
    selected: null,
    tileAt(q, r) { return this.map.tiles.find(t => t.q === q && t.r === r); },
    unitAt(q, r) { return this.units.find(u => u.q === q && u.r === r); },
    villageAt(q, r) { const t = this.tileAt(q, r); return t && t.hasVillage ? t : null; },
    ownedVillages(playerId) { return this.map.tiles.filter(t => t.hasVillage && t.ownerPlayer === playerId); },
    // Farms "owned" by a player = farms currently sitting in that player's
    // territory (within 1 hex of an owned village). Recomputed each call —
    // farm tiles store no explicit ownership, so capture-and-flip Just Works.
    ownedFarms(playerId) { return this.map.tiles.filter(t => t.hasFarm && isOwnTerritory(this, t.q, t.r, playerId)); },
  };
  // Recompute can-act flags client-side for UI affordances (visual only;
  // server still authoritatively validates each intent). The server's
  // GameState already carries canMove/canAttack — preserve them as-is.
  return state;
}

// Refresh from server, rebuild `game`, redraw, and update UI.
async function netRefreshAndRender() {
  const resp = await netFetchState();
  NET.serverTurn = resp.turn;
  NET.serverCurrentPlayer = resp.currentPlayer;
  NET.serverPhase = resp.phase;
  NET.serverWinner = resp.winner;
  const next = adoptServerView(resp.view, {
    phase: resp.phase,
    winner: resp.winner,
  });
  // Preserve user's current tile selection if still valid.
  if (game && game.selected) {
    const t = next.tileAt(game.selected.q, game.selected.r);
    if (t) next.selected = { ...game.selected };
  }
  game = next;
  updateAll();
  if (resp.phase === 'won') {
    showWin();
  }
}

function isMyTurn() {
  if (!NET.enabled) return true;
  return NET.serverCurrentPlayer === NET.myPlayer && NET.serverPhase === 'play';
}

async function clientTrainUnit(village, unitType) {
  if (!NET.enabled) {
    if (trainUnit(game, village, unitType)) { playSfx('train'); updateAll(); }
    return;

  if (!isMyTurn() || NET.inFlight) return;
  NET.inFlight = true;
  try {
    await netSubmitIntent({
      kind: 'TrainUnit',

    await netRefreshAndRender();

    NET.inFlight = false;

async function clientAttackUnit(attacker, defender) {

  if (!isMyTurn() || NET.inFlight) return null;

      attackerId: attacker.id,
      defenderId: defender.id,
    });
    await netRefreshAndRender();
    // Map server's AttackResolved event to the prototype's toast shape.
    const ev = (resp.events || []).find(e => e.kind === 'AttackResolved');
    if (ev) {
      return [{
        attackerType: attacker.type,
        defenderType: defender.type,
        defenderDamage: ev.data.defenderDamage,
        attackerDamage: ev.data.attackerDamage,
        defenderKilled: (resp.events || []).some(e => e.kind === 'UnitKilled' && e.data.unitId === defender.id),
        attackerKilled: (resp.events || []).some(e => e.kind === 'UnitKilled' && e.data.unitId === attacker.id),
      }];
    }
    return [];
  } catch (err) {
    console.warn('Attack failed:', err);

  } finally {
