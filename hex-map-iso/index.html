// Snapshot village ownership before an end-turn so we can detect captures
// after the resolver runs. Used by 3 call sites (offline endTurn, online,
// AI endTurn) to fire the capture jingle.
function snapshotVillageOwners(state) {
  return state.map.tiles
    .filter(t => t.hasVillage)
    .map(t => ({ q: t.q, r: t.r, owner: t.ownerPlayer }));
}
function ringCaptureSfxIfChanged(state, before) {
  const captured = state.map.tiles.some(t => {
    if (!t.hasVillage) return false;
    const prev = before.find(b => b.q === t.q && b.r === t.r);
    return prev && prev.owner !== t.ownerPlayer;
  });
  if (captured) setTimeout(() => playSfx('capture'), 250);
}

async function clientEndTurn() {
  if (!NET.enabled) {
    const before = snapshotVillageOwners(game);
    endTurn(game);
    playSfx('endTurn');
    ringCaptureSfxIfChanged(game, before);
    return;
  }
  if (!isMyTurn() || NET.inFlight) return;
  NET.inFlight = true;
  try {
    await netSubmitIntent({ kind: 'EndTurn' });
    await netRefreshAndRender();
  } catch (err) {
    console.warn('EndTurn failed:', err);
  } finally {
    NET.inFlight = false;
  }
}

async function clientStartNewGame(seed) {
  if (!NET.enabled) {
    // Caller (startNewGame) handles local reset.
    return;
  }
  NET.inFlight = true;
  try {
    const created = await netCreateGame(seed);
    NET.gameId = created.gameId;
    // Reflect gameId in the URL so reload preserves the session.
    try {
      const u = new URL(window.location.href);
      u.searchParams.set('game', created.gameId);
      u.searchParams.set('player', String(NET.myPlayer));
      window.history.replaceState({}, '', u.toString());
    } catch { /* noop */ }
    await netRefreshAndRender();
  } finally {
    NET.inFlight = false;
  }
}

// ============================================================
// CAMERA
// ============================================================
const camera = {
  x: 0, y: 0, zoom: 1,
  reset() { this.zoom = 1; this.recenter(); },
  recenter() { this.x = canvas.width / dpr / 2; this.y = canvas.height / dpr / 2; }
};

function worldToScreen(wx, wy) {
  return { x: camera.x + wx * camera.zoom, y: camera.y + wy * camera.zoom * ISO_Y_SCALE };
}
function screenToWorld(sx, sy) {
  return { x: (sx - camera.x) / camera.zoom, y: (sy - camera.y) / (camera.zoom * ISO_Y_SCALE) };
}
function tileScreenCorners(q, r) {
  const w = axialToWorld(q, r);
  const out = [];
  for (let i = 0; i < 6; i++) {
    const wo = HEX_CORNER_OFFSETS[i];
    out.push(worldToScreen(w.x + wo.x, w.y + wo.y));
  }
  return out;
}
function tileScreenCenter(q, r) {
  const w = axialToWorld(q, r);
  return worldToScreen(w.x, w.y);
}

// ============================================================
// RENDERER
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawTile(tile) {
  const corners = tileScreenCorners(tile.q, tile.r);
  const center = tileScreenCenter(tile.q, tile.r);
  const sz = HEX_SIZE * camera.zoom;
  const szY = sz * ISO_Y_SCALE;
  const depth = TILE_DEPTH * camera.zoom;
  const type = tile.type;
  const sinkY = type === TILE.WATER ? WATER_SINK * camera.zoom : 0;
  const topCorners = corners.map(c => ({ x: c.x, y: c.y + sinkY }));
  const topCenter = { x: center.x, y: center.y + sinkY };

  // Side wall — two faces for sun-from-upper-left shading
  const wallTop = topCorners;
  const wallBot = topCorners.map(c => ({ x: c.x, y: c.y + depth }));
  // Right-front face (1→2)
  ctx.beginPath();
  ctx.moveTo(wallTop[1].x, wallTop[1].y);
  ctx.lineTo(wallTop[2].x, wallTop[2].y);
  ctx.lineTo(wallBot[2].x, wallBot[2].y);
  ctx.lineTo(wallBot[1].x, wallBot[1].y);
  ctx.closePath();
  ctx.fillStyle = type.side; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.40)'; ctx.lineWidth = Math.max(0.5, 0.7 / camera.zoom); ctx.stroke();
  // Left-front face (2→3)
  ctx.beginPath();
  ctx.moveTo(wallTop[2].x, wallTop[2].y);
  ctx.lineTo(wallTop[3].x, wallTop[3].y);
  ctx.lineTo(wallBot[3].x, wallBot[3].y);
  ctx.lineTo(wallBot[2].x, wallBot[2].y);
  ctx.closePath();
  ctx.fillStyle = type.side; ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.20)'; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.40)'; ctx.lineWidth = Math.max(0.5, 0.7 / camera.zoom); ctx.stroke();

  // Hex top
  ctx.beginPath();
  ctx.moveTo(topCorners[0].x, topCorners[0].y);
  for (let i = 1; i < 6; i++) ctx.lineTo(topCorners[i].x, topCorners[i].y);
  ctx.closePath();
  ctx.fillStyle = type.top; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.30)'; ctx.lineWidth = Math.max(0.6, 1 / camera.zoom); ctx.stroke();

  // Right-half shading
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(topCorners[0].x, topCorners[0].y);
  ctx.lineTo(topCorners[1].x, topCorners[1].y);
  ctx.lineTo(topCenter.x, topCenter.y);
  ctx.lineTo(topCorners[5].x, topCorners[5].y);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fill();
  ctx.restore();

  // Features
  if (type === TILE.TREES) drawTreeCluster(topCenter.x, topCenter.y, sz, szY);
  else if (type === TILE.MOUNTAIN) drawMountain(topCenter.x, topCenter.y, sz, szY);
  else if (type === TILE.WATER) drawWaterShine(topCenter.x, topCenter.y, sz, szY);

  if (tile.hasVillage) {
    if (tile.hasWall) drawWalls(topCorners, sz, depth);
    drawVillage(topCenter.x, topCenter.y, sz, szY, tile.ownerPlayer);
  } else if (tile.hasFarm) {
    // Farm improvement (prototype v0). Drawn ONLY on plains-without-village
    // tiles, which is the only place BuildFarm is legal.
    drawFarm(topCenter.x, topCenter.y, sz, szY);
  }
}

function drawWalls(topCorners, sz, depth) {
  // Stone parapet ringing the village tile. A short, blocky band drawn
  // around the 6 hex edges with crenellations on the front-facing corners.
  // Walled tiles get ×4 defense bonus (GDD §2.7) — make them look the part.
  const wallH = Math.max(8, depth * 0.85);
  const wallTopColor = '#9ca3af';
  const wallSideColor = '#6b7280';
  const wallEdge = 'rgba(0,0,0,0.55)';

  // Inset corners slightly so the walls sit inside the hex rim (looks like
  // a curtain wall, not a re-paint of the hex edge).
  const cx = (topCorners[0].x + topCorners[3].x) / 2;
  const cy = (topCorners[0].y + topCorners[3].y) / 2;
  const inset = 0.92;
  const innerCorners = topCorners.map(c => ({
    x: cx + (c.x - cx) * inset,
    y: cy + (c.y - cy) * inset,
  }));

  // Wall band: 6 quads, each from an inner corner to the next, raised by wallH.
  for (let i = 0; i < 6; i++) {
    const a = innerCorners[i];
    const b = innerCorners[(i + 1) % 6];
    const isBack = i === 4 || i === 5 || i === 0; // back-facing half — fully visible
    // Side face
    ctx.fillStyle = wallSideColor;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.lineTo(b.x, b.y - wallH);
    ctx.lineTo(a.x, a.y - wallH);
    ctx.closePath();
    ctx.fill();
    if (isBack) {
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fill();
    }
    ctx.strokeStyle = wallEdge;
    ctx.lineWidth = Math.max(0.5, 0.7 / camera.zoom);
    ctx.stroke();
    // Top (parapet)
    ctx.beginPath();
    ctx.moveTo(a.x, a.y - wallH);
    ctx.lineTo(b.x, b.y - wallH);
    ctx.lineWidth = Math.max(1, 1.6 / camera.zoom);
    ctx.strokeStyle = wallTopColor;
    ctx.stroke();
  }
}

// Farm improvement (prototype v0). A small fenced plot with 3-4 yellow
// crop rows on a green field, drawn flush to the tile top. No ownership
// chrome — farm yield follows whichever player currently controls the
// territory (see startTurn), so showing a permanent flag would mislead.
function drawFarm(cx, cy, sz, szY) {
  const plotW = sz * 0.62;
  const plotH = szY * 0.46;
  const x0 = cx - plotW / 2;
  const y0 = cy - plotH / 2 + szY * 0.04;
  // Green field base.
  ctx.fillStyle = '#4d7c0f';
  ctx.fillRect(x0, y0, plotW, plotH);
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
  ctx.strokeRect(x0, y0, plotW, plotH);
  // Yellow crop rows (3 strips) — running horizontally across the plot.
  ctx.fillStyle = '#facc15';
  const rowCount = 3;
  const rowH = plotH * 0.16;
  const gap = (plotH - rowCount * rowH) / (rowCount + 1);
  for (let i = 0; i < rowCount; i++) {
    const ry = y0 + gap + i * (rowH + gap);
    ctx.fillRect(x0 + plotW * 0.08, ry, plotW * 0.84, rowH);
  }
  // Fence posts (4 corners) — small dark dots.
  ctx.fillStyle = '#5b3a29';
  const postR = Math.max(0.6, sz * 0.025);
  for (const [px, py] of [
    [x0, y0],
    [x0 + plotW, y0],
    [x0, y0 + plotH],
    [x0 + plotW, y0 + plotH],
  ]) {
    ctx.beginPath();
    ctx.arc(px, py, postR, 0, Math.PI * 2);
    ctx.closePath();
    ctx.fill();
  }
}

function drawTreeCluster(cx, cy, sz, szY) {
  const positions = [
    { dx: -0.20, dy:  0.04, h: 0.38 },
    { dx:  0.22, dy:  0.08, h: 0.46 },
    { dx:  0.02, dy: -0.20, h: 0.42 },
  ];
  for (const p of positions) {
    const x = cx + p.dx * sz;
    const baseY = cy + p.dy * szY;
    const topY = baseY - p.h * sz;
    ctx.fillStyle = '#5b3a29';
    ctx.fillRect(x - sz * 0.04, baseY - sz * 0.10, sz * 0.08, sz * 0.10);
    ctx.beginPath();
    ctx.moveTo(x, topY);
    ctx.lineTo(x - sz * 0.18, baseY - sz * 0.06);
    ctx.lineTo(x + sz * 0.18, baseY - sz * 0.06);
    ctx.closePath();
    ctx.fillStyle = '#166534'; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom); ctx.stroke();
  }
}

function drawMountain(cx, cy, sz, szY) {
  const baseY = cy + szY * 0.12;
  const peakY = cy - sz * 0.70;
  const baseW = sz * 0.85;
  ctx.beginPath();
  ctx.moveTo(cx, peakY);
  ctx.lineTo(cx - baseW / 2, baseY);
  ctx.lineTo(cx + baseW / 2, baseY);
  ctx.closePath();
  ctx.fillStyle = '#7c6f5a'; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, peakY);
  ctx.lineTo(cx - baseW * 0.18, peakY + sz * 0.25);
  ctx.lineTo(cx + baseW * 0.18, peakY + sz * 0.25);
  ctx.closePath();
  ctx.fillStyle = '#f3f4f6'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx, peakY);
  ctx.lineTo(cx + baseW / 2, baseY);
  ctx.lineTo(cx, baseY);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fill();
}

function drawWaterShine(cx, cy, sz, szY) {
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth = Math.max(0.6, 1.2 / camera.zoom);
  ctx.beginPath(); ctx.moveTo(cx - sz * 0.32, cy - szY * 0.08); ctx.lineTo(cx + sz * 0.32, cy - szY * 0.08); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - sz * 0.18, cy + szY * 0.12); ctx.lineTo(cx + sz * 0.18, cy + szY * 0.12); ctx.stroke();
}

function drawVillage(cx, cy, sz, szY, ownerPlayer) {
  const wallW = sz * 0.46, wallH = sz * 0.30, roofH = sz * 0.24;
  const baseY = cy + szY * 0.10;
  const wallTop = baseY - wallH;
  const ownerColor = ownerPlayer !== null ? PLAYER_COLORS[ownerPlayer].dark : '#6b3e1f';
  const wallColor = ownerPlayer !== null ? '#f1f5f9' : '#c8a878';
  ctx.fillStyle = wallColor; ctx.fillRect(cx - wallW / 2, wallTop, wallW, wallH);
  ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fillRect(cx, wallTop, wallW / 2, wallH);
  ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
  ctx.strokeRect(cx - wallW / 2, wallTop, wallW, wallH);
  const overhang = sz * 0.05;
  ctx.beginPath(); ctx.moveTo(cx, wallTop - roofH); ctx.lineTo(cx - wallW / 2 - overhang, wallTop); ctx.lineTo(cx + wallW / 2 + overhang, wallTop); ctx.closePath();
  ctx.fillStyle = ownerColor; ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx, wallTop - roofH); ctx.lineTo(cx + wallW / 2 + overhang, wallTop); ctx.lineTo(cx, wallTop); ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
  ctx.beginPath(); ctx.moveTo(cx, wallTop - roofH); ctx.lineTo(cx - wallW / 2 - overhang, wallTop); ctx.lineTo(cx + wallW / 2 + overhang, wallTop); ctx.closePath(); ctx.stroke();
  const doorW = sz * 0.12, doorH = sz * 0.17;
  ctx.fillStyle = '#3c2410'; ctx.fillRect(cx - doorW / 2, baseY - doorH, doorW, doorH);
  if (ownerPlayer !== null) {
    const poleX = cx + wallW / 2 + overhang - sz * 0.02;
    const poleTop = wallTop - roofH - sz * 0.30;
    ctx.strokeStyle = '#4b5563'; ctx.lineWidth = Math.max(0.8, 1.2 / camera.zoom);
    ctx.beginPath(); ctx.moveTo(poleX, wallTop - roofH); ctx.lineTo(poleX, poleTop); ctx.stroke();
    ctx.fillStyle = '#facc15';
    ctx.beginPath(); ctx.moveTo(poleX, poleTop); ctx.lineTo(poleX + sz * 0.16, poleTop + sz * 0.04); ctx.lineTo(poleX, poleTop + sz * 0.10); ctx.closePath(); ctx.fill();
  }
}

function drawUnit(cx, cy, sz, szY, unit) {
  const baseY = cy + szY * 0.18;
  const color = PLAYER_COLORS[unit.player].body;
  const colorDark = PLAYER_COLORS[unit.player].dark;
  if (unit.type === 'warrior') {
    const bodyW = sz * 0.20, bodyH = sz * 0.28, headR = sz * 0.10;
    const bodyTop = baseY - bodyH;
    ctx.fillStyle = color; ctx.fillRect(cx - bodyW / 2, bodyTop, bodyW, bodyH);
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
    ctx.strokeRect(cx - bodyW / 2, bodyTop, bodyW, bodyH);
    ctx.beginPath(); ctx.arc(cx, bodyTop - headR + sz * 0.02, headR, 0, Math.PI * 2); ctx.closePath();
    ctx.fillStyle = '#fde68a'; ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, bodyTop - headR + sz * 0.02, headR, Math.PI, 2 * Math.PI); ctx.closePath();
    ctx.fillStyle = '#6b7280'; ctx.fill(); ctx.stroke();
    ctx.fillStyle = colorDark;
    ctx.fillRect(cx - bodyW / 2 - sz * 0.10, bodyTop + sz * 0.04, sz * 0.10, sz * 0.18);
    ctx.strokeRect(cx - bodyW / 2 - sz * 0.10, bodyTop + sz * 0.04, sz * 0.10, sz * 0.18);
  } else if (unit.type === 'rider') {
    const horseY = baseY - sz * 0.18, horseW = sz * 0.42, horseH = sz * 0.16;
    ctx.fillStyle = '#78350f'; ctx.fillRect(cx - horseW / 2, horseY, horseW, horseH);
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
    ctx.strokeRect(cx - horseW / 2, horseY, horseW, horseH);
    const legW = sz * 0.04, legH = sz * 0.10;
    ctx.fillStyle = '#78350f';
    ctx.fillRect(cx - horseW / 2 + sz * 0.02, horseY + horseH, legW, legH);
    ctx.fillRect(cx - horseW / 2 + sz * 0.10, horseY + horseH, legW, legH);
    ctx.fillRect(cx + horseW / 2 - sz * 0.06, horseY + horseH, legW, legH);
    ctx.fillRect(cx + horseW / 2 - sz * 0.14, horseY + horseH, legW, legH);
    ctx.fillRect(cx + horseW / 2 - sz * 0.02, horseY - sz * 0.06, sz * 0.10, sz * 0.10);
    ctx.strokeRect(cx + horseW / 2 - sz * 0.02, horseY - sz * 0.06, sz * 0.10, sz * 0.10);
    const riderW = sz * 0.14, riderH = sz * 0.18;
    const riderTop = horseY - riderH;
    ctx.fillStyle = color; ctx.fillRect(cx - riderW / 2 - sz * 0.04, riderTop, riderW, riderH);
    ctx.strokeRect(cx - riderW / 2 - sz * 0.04, riderTop, riderW, riderH);
    const riderHeadR = sz * 0.08;
    ctx.beginPath(); ctx.arc(cx - sz * 0.04, riderTop - riderHeadR + sz * 0.02, riderHeadR, 0, Math.PI * 2); ctx.closePath();
    ctx.fillStyle = '#fde68a'; ctx.fill(); ctx.stroke();
  } else if (unit.type === 'archer') {
    // Smaller body (lighter armor), large bow on the side.
    const bodyW = sz * 0.16, bodyH = sz * 0.24, headR = sz * 0.09;
    const bodyTop = baseY - bodyH;
    ctx.fillStyle = color; ctx.fillRect(cx - bodyW / 2, bodyTop, bodyW, bodyH);
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
    ctx.strokeRect(cx - bodyW / 2, bodyTop, bodyW, bodyH);
    // Head (no helmet half — hooded look using colorDark hood cap).
    ctx.beginPath(); ctx.arc(cx, bodyTop - headR + sz * 0.02, headR, 0, Math.PI * 2); ctx.closePath();
    ctx.fillStyle = '#fde68a'; ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, bodyTop - headR + sz * 0.02, headR, Math.PI, 2 * Math.PI); ctx.closePath();
    ctx.fillStyle = colorDark; ctx.fill(); ctx.stroke();
    // Big curved bow on the unit's left, drawn as an arc.
    const bowCX = cx - bodyW / 2 - sz * 0.10;
    const bowCY = bodyTop + bodyH / 2;
    const bowR = sz * 0.22;
    ctx.strokeStyle = '#78350f'; ctx.lineWidth = Math.max(1.0, 1.6 / camera.zoom);
    ctx.beginPath(); ctx.arc(bowCX, bowCY, bowR, -Math.PI * 0.45, Math.PI * 0.45); ctx.stroke();
    // Bowstring.
    ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = Math.max(0.5, 0.8 / camera.zoom);
    ctx.beginPath();
    ctx.moveTo(bowCX + bowR * Math.cos(-Math.PI * 0.45), bowCY + bowR * Math.sin(-Math.PI * 0.45));
    ctx.lineTo(bowCX + bowR * Math.cos( Math.PI * 0.45), bowCY + bowR * Math.sin( Math.PI * 0.45));
    ctx.stroke();
  } else if (unit.type === 'defender') {
    // Heavily armored: wider body, helmet, tall shield in front.
    const bodyW = sz * 0.26, bodyH = sz * 0.32, headR = sz * 0.11;
    const bodyTop = baseY - bodyH;
    ctx.fillStyle = color; ctx.fillRect(cx - bodyW / 2, bodyTop, bodyW, bodyH);
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
    ctx.strokeRect(cx - bodyW / 2, bodyTop, bodyW, bodyH);
    // Armor pauldron strip (dark band across shoulders).
    ctx.fillStyle = colorDark; ctx.fillRect(cx - bodyW / 2, bodyTop, bodyW, sz * 0.06);
    ctx.strokeRect(cx - bodyW / 2, bodyTop, bodyW, sz * 0.06);
    // Head + helmet (grey full helm).
    ctx.beginPath(); ctx.arc(cx, bodyTop - headR + sz * 0.02, headR, 0, Math.PI * 2); ctx.closePath();
    ctx.fillStyle = '#9ca3af'; ctx.fill(); ctx.stroke();
    // Helmet visor slit.
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(cx - headR * 0.6, bodyTop - headR * 0.6, headR * 1.2, sz * 0.025);
    // Tall shield in front (vertical rectangle with rounded top — drawn as
    // a rectangle plus a small ellipse cap, using player color trimmed dark).
    const shieldW = sz * 0.16, shieldH = sz * 0.38;
    const shieldX = cx + bodyW / 2 - sz * 0.02;
    const shieldY = baseY - shieldH;
    ctx.fillStyle = colorDark;
    ctx.fillRect(shieldX, shieldY + sz * 0.04, shieldW, shieldH - sz * 0.04);
    ctx.beginPath(); ctx.ellipse(shieldX + shieldW / 2, shieldY + sz * 0.04, shieldW / 2, sz * 0.05, 0, 0, Math.PI * 2); ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = Math.max(0.5, 1 / camera.zoom);
    ctx.strokeRect(shieldX, shieldY + sz * 0.04, shieldW, shieldH - sz * 0.04);
    ctx.beginPath(); ctx.ellipse(shieldX + shieldW / 2, shieldY + sz * 0.04, shieldW / 2, sz * 0.05, 0, 0, Math.PI * 2); ctx.stroke();
    // Shield boss (player color dot).
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(shieldX + shieldW / 2, shieldY + shieldH / 2, sz * 0.04, 0, Math.PI * 2); ctx.closePath();
    ctx.fill(); ctx.stroke();
  }

  // HP bar above unit
  const stats = UNIT_STATS[unit.type];
  const barW = sz * 0.50;
  const barH = sz * 0.07;
  const barY = baseY - sz * 0.95;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(cx - barW / 2, barY, barW, barH);
  ctx.fillStyle = unit.hp / stats.hp > 0.5 ? '#22c55e' : (unit.hp / stats.hp > 0.25 ? '#eab308' : '#dc2626');
  ctx.fillRect(cx - barW / 2, barY, barW * (unit.hp / stats.hp), barH);
  ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = Math.max(0.4, 0.5 / camera.zoom);
  ctx.strokeRect(cx - barW / 2, barY, barW, barH);

  // Summoning sickness indicator (small grey dot)
  if (!unit.canMove && !unit.canAttack && !unit.hasMovedThisTurn) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.beginPath();
    ctx.arc(cx + sz * 0.30, barY + barH / 2, sz * 0.06, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#facc15';
    ctx.beginPath();
    ctx.arc(cx + sz * 0.30, barY + barH / 2, sz * 0.05, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHexRingAt(q, r, color, lineWidth, dashed) {
  const tile = game.tileAt(q, r);
  const raw = tileScreenCorners(q, r);
  const sinkY = tile && tile.type === TILE.WATER ? WATER_SINK * camera.zoom : 0;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  if (dashed) ctx.setLineDash([Math.max(3, 5 / camera.zoom), Math.max(3, 5 / camera.zoom)]);
  ctx.beginPath();
  ctx.moveTo(raw[0].x, raw[0].y + sinkY);
  for (let i = 1; i < 6; i++) ctx.lineTo(raw[i].x, raw[i].y + sinkY);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function drawHexFillAt(q, r, fillColor) {
  const tile = game.tileAt(q, r);
  const raw = tileScreenCorners(q, r);
  const sinkY = tile && tile.type === TILE.WATER ? WATER_SINK * camera.zoom : 0;
  ctx.save();
  ctx.fillStyle = fillColor;
  ctx.beginPath();
  ctx.moveTo(raw[0].x, raw[0].y + sinkY);
  for (let i = 1; i < 6; i++) ctx.lineTo(raw[i].x, raw[i].y + sinkY);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function draw() {
  ctx.fillStyle = '#0b1220';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Compute fog visibility for current player
  const visible = visibilityForPlayer(game, game.currentPlayer);

  const sorted = [...game.map.tiles].sort((a, b) => {
    const aw = axialToWorld(a.q, a.r);
    const bw = axialToWorld(b.q, b.r);
    return aw.y - bw.y;
  });
  for (const t of sorted) drawTile(t);

  // SC2-style fog overlay — dim non-visible tiles (terrain still readable)
  for (const t of game.map.tiles) {
    if (!isVisible(visible, t.q, t.r)) {
      drawHexFillAt(t.q, t.r, 'rgba(11, 18, 32, 0.48)');
    }
  }

  // Territory rings around each owned village (player color)
  for (const t of game.map.tiles) {
    if (t.hasVillage && t.ownerPlayer !== null) {
      const color = PLAYER_COLORS[t.ownerPlayer].body;
      // Thick solid ring around the village tile itself
      drawHexRingAt(t.q, t.r, color, Math.max(2.5, 3 / camera.zoom), false);
      // Dashed ring on each adjacent hex (1-tile territory)
      for (const n of neighborsOf(t.q, t.r)) {
        const adj = game.tileAt(n.q, n.r);
        if (!adj) continue;
        ctx.save();
        ctx.globalAlpha = 0.7;
        drawHexRingAt(n.q, n.r, color, Math.max(1.5, 2 / camera.zoom), true);
        ctx.restore();
      }
    }
  }

  // Units (filter enemy units by visibility)
  const sortedUnits = [...game.units].sort((a, b) => {
    const aw = axialToWorld(a.q, a.r);
    const bw = axialToWorld(b.q, b.r);
    return aw.y - bw.y;
  });
  for (const u of sortedUnits) {
    if (u.player !== game.currentPlayer && !isVisible(visible, u.q, u.r)) continue;
    const c = tileScreenCenter(u.q, u.r);
    const sinkY = game.tileAt(u.q, u.r).type === TILE.WATER ? WATER_SINK * camera.zoom : 0;
    drawUnit(c.x, c.y + sinkY, HEX_SIZE * camera.zoom, HEX_SIZE * camera.zoom * ISO_Y_SCALE, u);
  }

  // Selection highlights
  if (game.selected && game.selected.kind === 'unit') {
    const u = game.unitAt(game.selected.q, game.selected.r);
    if (u && u.player === game.currentPlayer) {
      if (u.canMove) {
        const moves = reachableTiles(game, u);
        for (const m of moves) drawHexFillAt(m.q, m.r, 'rgba(34,197,94,0.30)');
      }
      if (u.canAttack) {
        const atks = attackableTiles(game, u);
        for (const a of atks) drawHexFillAt(a.q, a.r, 'rgba(250,204,21,0.45)');
      }
      drawHexRingAt(u.q, u.r, '#facc15', 3, false);
    }
  }
  if (game.selected && game.selected.kind === 'village') {
    drawHexRingAt(game.selected.q, game.selected.r, '#facc15', 3, false);
  }
  if (game.selected && game.selected.kind === 'plains') {
    // Same chrome as village — the player has chosen a tile, treat selection
    // identically. (Picker differentiates by available actions.)
    drawHexRingAt(game.selected.q, game.selected.r, '#facc15', 3, false);
  }
}

// ============================================================
// INPUT — pan, pinch zoom, tap
// ============================================================
function tileAtScreen(sx, sy) {
  const w = screenToWorld(sx, sy);
  let best = null, bestDist = Infinity;
  for (const t of game.map.tiles) {
    const tw = axialToWorld(t.q, t.r);
    const d = Math.hypot(w.x - tw.x, w.y - tw.y);
    if (d < bestDist) { bestDist = d; best = t; }
  }
  if (bestDist < HEX_SIZE * 1.05) return best;
  return null;
}

const pointers = new Map();
let pinchBaseDist = 0, pinchBaseZoom = 1, pinchBaseCenter = { x: 0, y: 0 };
let panBase = null, didDrag = false;

function pointerDown(e) {
  unlockSfxOnce();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  didDrag = false;
  if (pointers.size === 1) panBase = { x: e.clientX, y: e.clientY, camX: camera.x, camY: camera.y };
  else if (pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    pinchBaseDist = Math.hypot(a.x - b.x, a.y - b.y);
    pinchBaseZoom = camera.zoom;
    pinchBaseCenter = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
  }
}
function pointerMove(e) {
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size === 1 && panBase) {
    const dx = e.clientX - panBase.x, dy = e.clientY - panBase.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
    camera.x = panBase.camX + dx; camera.y = panBase.camY + dy;
    draw();
  } else if (pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    const newDist = Math.hypot(a.x - b.x, a.y - b.y);
    if (pinchBaseDist > 0) {
      const newZoom = clamp(pinchBaseZoom * (newDist / pinchBaseDist), 0.4, 3.0);
      const cx = pinchBaseCenter.x, cy = pinchBaseCenter.y;
      const ratio = newZoom / camera.zoom;
      camera.x = cx - (cx - camera.x) * ratio;
      camera.y = cy - (cy - camera.y) * ratio;
      camera.zoom = newZoom;
      didDrag = true;
      draw();
    }
  }
}
function pointerUp(e) {
  const wasOnePointer = pointers.size === 1;
  pointers.delete(e.pointerId);
  if (pointers.size === 0) {
    if (wasOnePointer && !didDrag) handleTap(e.clientX, e.clientY);
    panBase = null;
  } else if (pointers.size === 1) {
    const [p] = [...pointers.values()];
    panBase = { x: p.x, y: p.y, camX: camera.x, camY: camera.y };
  }
}
function pointerCancel(e) {
  pointers.delete(e.pointerId);
  if (pointers.size === 0) panBase = null;
}
function wheel(e) {
  e.preventDefault();
  const dir = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  const newZoom = clamp(camera.zoom * dir, 0.4, 3.0);
  const ratio = newZoom / camera.zoom;
  camera.x = e.clientX - (e.clientX - camera.x) * ratio;
  camera.y = e.clientY - (e.clientY - camera.y) * ratio;
  camera.zoom = newZoom;
  draw();
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
canvas.addEventListener('pointerdown', pointerDown);
canvas.addEventListener('pointermove', pointerMove);
canvas.addEventListener('pointerup', pointerUp);
canvas.addEventListener('pointercancel', pointerCancel);
canvas.addEventListener('wheel', wheel, { passive: false });

// ============================================================
// TAP DISPATCH
// ============================================================
function handleTap(sx, sy) {
  if (game.phase !== 'play') return;
  // In online mode, block input while not our turn or while a request is pending.
  if (NET.enabled && (!isMyTurn() || NET.inFlight)) return;
  const tile = tileAtScreen(sx, sy);
  if (!tile) {
    clearSelection();
    return;
  }
  // Currently selected unit → attempt move or attack
  if (game.selected && game.selected.kind === 'unit') {
    const sel = game.unitAt(game.selected.q, game.selected.r);
    if (sel && sel.player === game.currentPlayer) {
      const targetUnit = game.unitAt(tile.q, tile.r);
      if (targetUnit && targetUnit.player !== sel.player) {
        // Attack
        (async () => {
          const events = await clientAttackUnit(sel, targetUnit);
          if (events && events.length > 0) {
            showCombatToast(events[0]);
            clearSelection();
            if (!NET.enabled) {
              // Online refresh already handled win-detection in netRefreshAndRender.
              checkWin();
              updateAll();
            }
          }
        })();
        return;
      } else if (!targetUnit && sel.canMove) {
        // Move
        (async () => {
          const moved = await clientMoveUnit(sel, tile.q, tile.r);
          if (moved) {
            // Keep selection on the new position so Rider Dash hints are visible.
            // In online mode the unit reference is from a stale (pre-fetch) state
            // — use the destination coordinates we requested.
            game.selected = { kind: 'unit', q: tile.q, r: tile.r };
            updateAll();
          }
        })();
        return;
      }
    }
  }

  // Select friendly unit
  const u = game.unitAt(tile.q, tile.r);
  if (u && u.player === game.currentPlayer) {
    game.selected = { kind: 'unit', q: tile.q, r: tile.r };
    updateAll();
    return;
  }

  // Select own village
  if (tile.hasVillage && tile.ownerPlayer === game.currentPlayer) {
    game.selected = { kind: 'village', q: tile.q, r: tile.r };
    updateAll();
    return;
  }

  // Select an empty plains tile inside current player's territory — this is
  // a Build-Farm candidate. Restricted to plains (per BuildFarm rules) and
  // tiles without a farm or village. Only on the human's own turn (so the
  // selection chrome doesn't pop up while the AI is acting).
  if (
    tile.type === TILE.PLAINS &&
    !tile.hasVillage &&
    !tile.hasFarm &&
    !u &&
    isOwnTerritory(game, tile.q, tile.r, game.currentPlayer) &&
    (!NET.enabled || isMyTurn())
  ) {
    game.selected = { kind: 'plains', q: tile.q, r: tile.r };
    updateAll();
    return;
  }

  // Otherwise clear
  clearSelection();
}

function clearSelection() {
  game.selected = null;
  updateAll();
}

function updateTopBar() {
  const cp = game.currentPlayer;
  const pc = PLAYER_COLORS[cp];
  turnPill.textContent = `${pc.short} · ${game.players[cp].stars}★ · Turn ${game.turn}`;
  turnPill.className = `pill ${cp === 0 ? 'p1' : 'p2'}`;
  endTurnBtn.className = cp === 1 ? 'p2' : '';
  endTurnBtn.textContent = `End ${pc.short} Turn`;
  if (modePill) {
    if (NET.enabled) {
      const tag = NET.gameId ? NET.gameId.slice(0, 4) : '...';
      const me = `P${NET.myPlayer + 1}`;
      const mine = isMyTurn() ? 'your turn' : 'waiting';
      modePill.textContent = `online · ${me} · ${mine} · ${tag}`;
      modePill.className = 'pill';
    } else {
      modePill.textContent = 'offline';
      modePill.className = 'pill muted';
    }
  }
  // In online mode the End Turn button must be disabled when it isn't our turn.
  if (NET.enabled) {
    endTurnBtn.disabled = !isMyTurn() || NET.inFlight;
    endTurnBtn.style.opacity = endTurnBtn.disabled ? '0.5' : '';
  } else {
    endTurnBtn.disabled = false;
    endTurnBtn.style.opacity = '';
  }
}

function updateHoverPill() {
  if (game.selected && game.selected.kind === 'unit') {
    const u = game.unitAt(game.selected.q, game.selected.r);
    if (u) {
      const stats = UNIT_STATS[u.type];
      const status = u.canMove || u.canAttack ? '' : ' (used)';
      const sick = !u.canMove && !u.canAttack && !u.hasMovedThisTurn ? ' (sickness)' : '';
      hoverPill.textContent = `${PLAYER_COLORS[u.player].short} ${stats.label} · ${u.hp}/${stats.hp} HP${status}${sick}`;
      return;
    }
  }
  if (game.selected && game.selected.kind === 'village') {
    const v = game.villageAt(game.selected.q, game.selected.r);
    if (v) {
      hoverPill.textContent = `My village · empty: ${!game.unitAt(v.q, v.r)}`;
      return;
    }
  }
  if (game.selected && game.selected.kind === 'plains') {
    hoverPill.textContent = `Plains · can build Farm (${FARM_COST}★)`;
    return;
  }
  hoverPill.textContent = 'tap your unit or village';
}

// Apply tech-gating presentation to a train button: when the unit's tech
// isn't researched we disable the button, change the cost label to
// "Need <Tech>", and set a title tooltip. When researched the cost reverts
// to the unit's star cost.
function applyTrainBtnGate(btn, unitType, empty, stars, researched) {
  const required = UNIT_TECH_REQUIREMENT[unitType];
  const techOk = !required || researched.includes(required);
  const costSpan = btn.querySelector('.ap-cost');
  if (!techOk) {
    btn.disabled = true;
    if (costSpan) costSpan.textContent = `Need ${TECH_META[required].label}`;
    btn.title = `Research ${TECH_META[required].label} to unlock ${UNIT_STATS[unitType].label}`;
  } else {
    btn.disabled = !empty || stars < UNIT_STATS[unitType].cost;
    if (costSpan) costSpan.textContent = `${UNIT_STATS[unitType].cost}★`;
    btn.title = '';
  }
}

function updateActionPicker() {
  // Default both panels hidden; we'll re-show the appropriate one below.
  const farmPicker = document.getElementById('farmPicker');
  if (game.selected && game.selected.kind === 'village') {
    const v = game.villageAt(game.selected.q, game.selected.r);
    if (v && v.ownerPlayer === game.currentPlayer) {
      actionPicker.style.display = 'block';
      if (farmPicker) farmPicker.style.display = 'none';
      const empty = !game.unitAt(v.q, v.r);
      const stars = game.players[game.currentPlayer].stars;
      const researched = game.players[game.currentPlayer].researchedTechs;
      apTitle.textContent = `${PLAYER_COLORS[game.currentPlayer].short} Village`;
      apSub.textContent = empty ? `Train a unit (${stars}★ available)` : 'A unit is here';
      applyTrainBtnGate(makeWarriorBtn,  'warrior',  empty, stars, researched);
      applyTrainBtnGate(makeRiderBtn,    'rider',    empty, stars, researched);
      applyTrainBtnGate(makeArcherBtn,   'archer',   empty, stars, researched);
      applyTrainBtnGate(makeDefenderBtn, 'defender', empty, stars, researched);
      const wallBtn = document.getElementById('buildWallBtn');
      if (wallBtn) {
        wallBtn.disabled = v.hasWall || stars < WALL_COST;
        wallBtn.querySelector('span:nth-child(2)').textContent = v.hasWall ? 'Walled' : 'Build Wall';
      }
      return;
    }
  }
  // Plains selection — show BuildFarm picker if the tile still qualifies.
  if (game.selected && game.selected.kind === 'plains') {
    const t = game.tileAt(game.selected.q, game.selected.r);
    const stars = game.players[game.currentPlayer].stars;
    if (
      t &&
      t.type === TILE.PLAINS &&
      !t.hasVillage &&
      !t.hasFarm &&
      !game.unitAt(t.q, t.r) &&
      isOwnTerritory(game, t.q, t.r, game.currentPlayer)
    ) {
      if (farmPicker) {
        farmPicker.style.display = 'block';
        const fpSub = document.getElementById('fpSub');
        if (fpSub) fpSub.textContent = `Build a farm: +${STARS_PER_FARM}★/turn (${stars}★ available)`;
        const buildFarmBtn = document.getElementById('buildFarmBtn');
        if (buildFarmBtn) {
          buildFarmBtn.disabled = stars < FARM_COST || (NET.enabled && !isMyTurn());
        }
      }
      actionPicker.style.display = 'none';
      return;
    }
  }
  actionPicker.style.display = 'none';
  if (farmPicker) farmPicker.style.display = 'none';
}

// ---- Tech panel ----
function renderTechPanel() {
  const player = game.players[game.currentPlayer];
  techList.innerHTML = '';
  for (const id of TECH_IDS) {
    const meta = TECH_META[id];
    const done = player.researchedTechs.includes(id);
    const affordable = player.stars >= TECH_COST;
    const row = document.createElement('div');
    row.className = 'tech-row' + (done ? ' done' : '');
    const icon = document.createElement('div');
    icon.className = 't-icon';
    icon.style.background = meta.color;
    row.appendChild(icon);
    const metaBox = document.createElement('div');
    metaBox.className = 't-meta';
    const name = document.createElement('div');
    name.className = 't-name';
    name.textContent = meta.label;
    const sub = document.createElement('div');
    sub.className = 't-sub';
    sub.textContent = done
      ? `Unlocks ${meta.unlocksLabel} · researched`
      : `Unlocks ${meta.unlocksLabel} · ${TECH_COST}★`;
    metaBox.appendChild(name);
    metaBox.appendChild(sub);
    row.appendChild(metaBox);
    if (done) {
      const tag = document.createElement('span');
      tag.className = 't-done';
      tag.textContent = 'OK';
      row.appendChild(tag);
    } else {
      const btn = document.createElement('button');
      btn.textContent = `Research (${TECH_COST}★)`;
      btn.disabled = !affordable;
      btn.addEventListener('click', () => {
        // updateAll() in offline mode (and netRefreshAndRender() in online)
        // both re-render the tech panel via the visibility-check helper.
        clientResearch(id);
      });
      row.appendChild(btn);
    }
    techList.appendChild(row);
  }
}

function openTechPanel() {
  renderTechPanel();
  techPanel.style.display = 'block';
}
function closeTechPanel() { techPanel.style.display = 'none'; }

function updateAll() {
  updateTopBar();
  updateHoverPill();
  updateActionPicker();
  if (techPanel && techPanel.style.display === 'block') renderTechPanel();
  draw();
}

techBtn.addEventListener('click', () => {
  if (techPanel.style.display === 'block') closeTechPanel();
  else openTechPanel();
});
techCloseBtn.addEventListener('click', closeTechPanel);

makeWarriorBtn.addEventListener('click', () => {
  if (!game.selected) return;
  const v = game.villageAt(game.selected.q, game.selected.r);
  if (v) clientTrainUnit(v, 'warrior');
});
makeRiderBtn.addEventListener('click', () => {
  if (!game.selected) return;
  const v = game.villageAt(game.selected.q, game.selected.r);
  if (v) clientTrainUnit(v, 'rider');
});
makeArcherBtn.addEventListener('click', () => {
  if (!game.selected) return;
  const v = game.villageAt(game.selected.q, game.selected.r);
  if (v) clientTrainUnit(v, 'archer');
});
makeDefenderBtn.addEventListener('click', () => {
  if (!game.selected) return;
  const v = game.villageAt(game.selected.q, game.selected.r);
  if (v) clientTrainUnit(v, 'defender');
});
const buildWallBtn = document.getElementById('buildWallBtn');
buildWallBtn.addEventListener('click', () => {
  if (!game.selected) return;
  const v = game.villageAt(game.selected.q, game.selected.r);
  if (v) clientBuildWall(v);
});
const buildFarmBtnEl = document.getElementById('buildFarmBtn');
if (buildFarmBtnEl) {
  buildFarmBtnEl.addEventListener('click', () => {
    if (!game.selected || game.selected.kind !== 'plains') return;
    const t = game.tileAt(game.selected.q, game.selected.r);
    if (t) clientBuildFarm(t);
  });
}
const fpCloseBtnEl = document.getElementById('fpCloseBtn');
if (fpCloseBtnEl) {
  fpCloseBtnEl.addEventListener('click', () => { clearSelection(); });
}
apCloseBtn.addEventListener('click', () => { clearSelection(); });

endTurnBtn.addEventListener('click', () => {
  if (game.phase !== 'play') return;
  if (NET.enabled) {
    // Online: post EndTurn, then refresh. No pass overlay.
    clientEndTurn();
    return;
  }
  // Local end turn.
  const before = snapshotVillageOwners(game);
  endTurn(game);
  playSfx('endTurn');
  ringCaptureSfxIfChanged(game, before);
  if (game.phase === 'won') {
    showWin();
    return;
  }
  // AI-mode: if the next player is the AI, skip the pass overlay and
  // run the bot turn (which itself ends turn & either shows pass or win).
  if (AI.enabled && game.currentPlayer === AI.player) {
    runAiTurn();
    return;
  }
  showPassScreen();
});

// Run the AI's turn end-to-end: startTurn → aiPlayTurn → endTurn → either
// show pass overlay (back to human) or show win. Re-entrancy guarded.
async function runAiTurn() {
  if (AI.acting) return;
  AI.acting = true;
  try {
    // The phase is currently 'pass' from the prior endTurn() call. Flip
    // back to 'play' and tick startTurn so the bot's units get income +
    // canMove/canAttack flags. Render so the player sees the AI's stars.
    game.phase = 'play';
    startTurn(game);
    updateAll();
    // Brief beat so the human can read "P2 · X★ · Turn N" before the
    // bot starts moving.
    await aiSleep(AI.actionDelayMs);
    await aiPlayTurn(game, ev => {
      if (ev && ev.kind === 'attack' && ev.events && ev.events[0]) {
        showCombatToast(ev.events[0]);
      }
      updateAll();
    });
    // AI ends its turn.
    const before = snapshotVillageOwners(game);
    endTurn(game);
    playSfx('endTurn');
    ringCaptureSfxIfChanged(game, before);
    if (game.phase === 'won') {
      updateAll();
      showWin();
      return;
    }
    // Back to human — show pass overlay so they tap to start their turn.
    // (Could skip too, but pass screen gives a nice visual breath.)
    updateAll();
    showPassScreen();
  } finally {
    AI.acting = false;
  }
}

function showCombatToast(ev) {
  const a = UNIT_STATS[ev.attackerType].label;
  const d = UNIT_STATS[ev.defenderType].label;
  let msg = `${a} hit ${d} for ${ev.defenderDamage}`;
  if (ev.attackerDamage > 0) msg += `, took ${ev.attackerDamage} back`;
  if (ev.defenderKilled) msg += ` — killed!`;
  if (ev.attackerKilled) msg += ` — and died`;
  combatToast.textContent = msg;
  combatToast.classList.add('show');
  setTimeout(() => combatToast.classList.remove('show'), 2200);
}

function showPassScreen() {
  const next = game.currentPlayer;
  const pc = PLAYER_COLORS[next];
  passTitle.textContent = `Pass to ${pc.label}`;
  passBtn.textContent = `I'm ${pc.label} — start turn`;
  passBtn.className = next === 0 ? '' : 'p2';
  passOverlay.style.display = 'flex';
}
passBtn.addEventListener('click', () => {
  passOverlay.style.display = 'none';
  game.phase = 'play';
  startTurn(game);
  updateAll();
});

function showWin() {
  const pc = PLAYER_COLORS[game.winner];
  winTitle.textContent = `${pc.label} wins!`;
  winSub.textContent = `Captured the opposing village.`;
  winOverlay.style.display = 'flex';
}
function checkWin() {
  for (let p = 0; p < 2; p++) {
    const opp = 1 - p;
    const oppOwns = game.map.tiles.some(t => t.hasVillage && t.ownerPlayer === opp);
    const oppUnits = game.units.some(u => u.player === opp);
    if (!oppOwns && !oppUnits) {
      game.phase = 'won';
      game.winner = p;
      showWin();
      return;
    }
  }
}
winRestartBtn.addEventListener('click', () => {
  winOverlay.style.display = 'none';
  startNewGame();
});

function startNewGame() {
  const seedStr = seedInput.value;
  let seed = parseInt(seedStr, 10);
  if (!Number.isFinite(seed)) seed = Math.floor(Math.random() * 1e9);
  if (NET.enabled) {
    // Online: ask the server to create a new game; it owns map gen + state.
    // The seed field is sent so the server can deterministically replay,
    // but the server controls authoritative state.
    seedInput.value = String(seed);
    camera.reset();
    clientStartNewGame(seed).catch(err => {
      console.warn('Could not start online game:', err);
    });
    return;
  }
  game = newGame(seed);
  startTurn(game);
  seedInput.value = String(seed);
  camera.reset();
  updateAll();
}
newGameBtn.addEventListener('click', () => {
  const n = Math.floor(Math.random() * 1e9);
  seedInput.value = String(n);
  startNewGame();
});
seedInput.addEventListener('change', startNewGame);

// "vs AI" toggle — opt-in client-side AI for P2. Persists via ?ai=1 so a
// page refresh keeps the mode. Toggling does NOT auto-start a new game;
// the player chooses when to re-roll the map. This matches the "New" button
// flow where stars/units carry forward only if the player wants them to.
const aiToggleBtn = document.getElementById('aiToggleBtn');
function refreshAiToggleLabel() {
  if (!aiToggleBtn) return;
  aiToggleBtn.textContent = AI.enabled ? 'vs AI: on' : 'vs AI: off';
  aiToggleBtn.style.background = AI.enabled ? 'var(--p2)' : '';
  aiToggleBtn.style.color = AI.enabled ? 'white' : '';
  aiToggleBtn.style.borderColor = AI.enabled ? 'transparent' : '';
}
if (aiToggleBtn) {
  aiToggleBtn.addEventListener('click', () => {
    AI.enabled = !AI.enabled;
    writeAiFlagToUrl(AI.enabled);
    refreshAiToggleLabel();
    // Re-roll so the map gen can re-pick capitals with the new mode in mind.
    startNewGame();
    // If we just turned AI on and the next-to-act is the bot (shouldn't be
    // at turn 1 since P1 starts), kick it off. Defensive.
    if (AI.enabled && game.currentPlayer === AI.player && game.phase === 'play') {
      runAiTurn();
    }
  });
}

// ============================================================
// BOOT
// ============================================================
window.addEventListener('resize', () => { resizeCanvas(); camera.recenter(); draw(); });
resizeCanvas();
camera.reset();
seedInput.value = '1';

(async function boot() {
  // Honor ?ai=1 — must be read BEFORE the initial newGame() so map gen
  // can give P1 the more-central spawn. The top-of-file `let game =
  // newGame(1)` line already ran, so re-roll once we know AI is on.
  AI.enabled = readAiConfigFromUrl();
  refreshAiToggleLabel();
  if (AI.enabled) {
    // Re-run map gen with AI flag enabled so capital placement is correct.
    game = newGame(parseInt(seedInput.value, 10) || 1);
    startTurn(game);
  }

  const cfg = readNetConfigFromUrl();
  if (cfg.enabled) {
    NET.enabled = true;
    NET.baseUrl = cfg.baseUrl;
    NET.myPlayer = cfg.myPlayer;
    try {
      if (cfg.gameId) {
        // Rejoin an existing game.
        NET.gameId = cfg.gameId;
        await netRefreshAndRender();
      } else {
        // Create a fresh online game.
        await clientStartNewGame(undefined);
      }
      // Poll every 3s for opponent's moves when it isn't our turn.
      setInterval(() => {
        if (!NET.enabled) return;
        if (NET.inFlight) return;
        if (isMyTurn()) return;
        netRefreshAndRender().catch(err => console.warn('Poll failed:', err));
      }, 3000);
    } catch (err) {
      console.warn('Online boot failed; falling back to offline:', err);
      NET.enabled = false;
      updateAll();
    }
  } else {
    // Offline default — pre-existing behavior, exactly as it was.
    updateAll();
  }
})();

</script>
